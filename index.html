<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIEL PRO MASTER 5.0</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #f1f5f9; font-family: sans-serif; margin: 0; padding: 20px; color: #1e293b; }
        .container { max-width: 1200px; margin: 0 auto; }
        header { background: #0C447C; color: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        nav { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .btn-nav { padding: 10px 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: #cbd5e1; }
        .active { background: #0C447C; color: white; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        input, select, textarea { width: 100%; padding: 10px; margin: 5px 0; border-radius: 8px; border: 1px solid #cbd5e1; box-sizing: border-box; }
        .prompt-box { background: #1e293b; color: #38bdf8; padding: 15px; border-radius: 10px; font-family: monospace; font-size: 13px; white-space: pre-wrap; }
        .badge { padding: 4px 8px; border-radius: 10px; font-size: 12px; font-weight: bold; }
        .pass { background: #dcfce7; color: #166534; }
        .fail { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [tab, setTab] = useState('ESTRUCTURA');
            const [form, setForm] = useState({
                empresa: "", tipo: "Contratista", asociacion: "Empresa Única", unspsc: "",
                activos: 0, pasivos: 0, utilidad: 0, gInt: 0,
                base: 0, usaAIU: false, pU: 3, tasaIca: 9.66, estampillas: 2,
                miembros: [{ id: 1, nombre: '', participacion: 100 }]
            });

            // Cálculos Financieros
            const liq = form.pasivos > 0 ? (Number(form.activos) / Number(form.pasivos)).toFixed(2) : 0;
            const end = form.activos > 0 ? ((Number(form.pasivos) / Number(form.activos)) * 100).toFixed(1) : 0;
            
            // Cálculos RETENCOL
            const vTotal = Number(form.base) || 0;
            const baseRF = form.usaAIU ? (vTotal * (Number(form.pU) / 100)) : vTotal;
            const vRf = baseRF * 0.04;
            const vIca = (vTotal * Number(form.tasaIca)) / 1000;
            const vEst = vTotal * (Number(form.estampillas) / 100);
            const neto = vTotal - (vRf + vIca + vEst);

            const PROMPT = `ACTÚA COMO CONSULTOR SENIOR. Analiza pliego para ${form.tipo} (${form.asociacion}). 
UNSPSC del proponente: ${form.unspsc}. 
Indicadores Financieros: Liq ${liq}, End ${end}%.
Detecta: 1. Amarres técnicos. 2. Riesgos en cláusulas de multas. 3. Veredicto Go/No Go.`;

            return (
                <div className="container">
                    <header>
                        <h1 style={{margin:0}}>SIEL PRO 5.0</h1>
                        <p style={{margin:0, opacity:0.8}}>Blindaje Contractual Avanzado</p>
                    </header>

                    <nav>
                        <button className={"btn-nav " + (tab === 'ESTRUCTURA' ? 'active' : '')} onClick={() => setTab('ESTRUCTURA')}>🏢 ESTRUCTURA</button>
                        <button className={"btn-nav " + (tab === 'FINANZAS' ? 'active' : '')} onClick={() => setTab('FINANZAS')}>📊 FINANZAS</button>
                        <button className={"btn-nav " + (tab === 'IA' ? 'active' : '')} onClick={() => setTab('IA')}>🤖 CEREBRO IA</button>
                        <button className={"btn-nav " + (tab === 'RETENCOL' ? 'active' : '')} onClick={() => setTab('RETENCOL')}>💰 RETENCOL AIU</button>
                    </nav>

                    {tab === 'ESTRUCTURA' && (
                        <div className="card">
                            <h3>Perfil del Proponente y UT/Consorcios</h3>
                            <div className="grid">
                                <div>
                                    <label>Tipo de Proceso</label>
                                    <select value={form.tipo} onChange={e=>setForm({...form, tipo: e.target.value})}>
                                        <option>Contratista</option>
                                        <option>Interventoría</option>
                                        <option>Consultoría</option>
                                    </select>
                                </div>
                                <div>
                                    <label>Forma Asociativa</label>
                                    <select value={form.asociacion} onChange={e=>setForm({...form, asociacion: e.target.value})}>
                                        <option>Empresa Única</option>
                                        <option>Unión Temporal</option>
                                        <option>Consorcio</option>
                                    </select>
                                </div>
                            </div>
                            <label>Códigos UNSPSC (Habilitados en RUP)</label>
                            <textarea placeholder="Pegue aquí sus códigos..." onChange={e=>setForm({...form, unspsc: e.target.value})} />
                            
                            <h4>Miembros de la Asociación</h4>
                            {form.miembros.map((m, i) => (
                                <div key={m.id} className="grid" style={{marginBottom: '10px'}}>
                                    <input placeholder="Nombre Miembro" />
                                    <input type="number" placeholder="% Participación" />
                                </div>
                            ))}
                            <button className="btn-nav" onClick={()=>setForm({...form, miembros: [...form.miembros, {id: Date.now()}]})}>+ Añadir Miembro</button>
                        </div>
                    )}

                    {tab === 'FINANZAS' && (
                        <div className="grid">
                            <div className="card">
                                <h3>Habilitantes Financieros</h3>
                                <label>Activo Corriente</label><input type="number" onChange={e=>setForm({...form, activos: e.target.value})} />
                                <label>Pasivo Corriente</label><input type="number" onChange={e=>setForm({...form, pasivos: e.target.value})} />
                            </div>
                            <div className="card" style={{background:'#f8fafc'}}>
                                <h3>Veredicto RUP</h3>
                                <p>Liquidez (>1.2): <span className={"badge " + (liq>=1.2?'pass':'fail')}>{liq}</span></p>
                                <p>Endeudamiento (<70%): <span className={"badge " + (end<=70?'pass':'fail')}>{end}%</span></p>
                            </div>
                        </div>
                    )}

                    {tab === 'IA' && (
                        <div className="card">
                            <h3>Prompt Maestro para Gemini/ChatGPT</h3>
                            <div className="prompt-box">{PROMPT}</div>
                            <hr/>
                            <h3>Trampas en Pliegos / Contratos</h3>
                            <label><input type="checkbox" /> UNSPSC extraños al objeto</label>
                            <label><input type="checkbox" /> Visitas obligatorias en menos de 3 días</label>
                            <label><input type="checkbox" /> Cláusulas de multas sin debido proceso</label>
                        </div>
                    )}

                    {tab === 'RETENCOL' && (
                        <div className="grid">
                            <div className="card">
                                <h3>Calculadora Tributaria AIU</h3>
                                <label>Valor Contrato</label><input type="number" onChange={e=>setForm({...form, base: e.target.value})} />
                                <label><input type="checkbox" checked={form.usaAIU} onChange={e=>setForm({...form, usaAIU: e.target.checked})} /> ¿Aplica AIU?</label>
                                {form.usaAIU && <input type="number" placeholder="% Utilidad (U)" value={form.pU} onChange={e=>setForm({...form, pU: e.target.value})} />}
                                <label>Tasa ICA (x mil)</label><input type="number" value={form.tasaIca} onChange={e=>setForm({...form, tasaIca: e.target.value})} />
                                <label>% Estampillas</label><input type="number" value={form.estampillas} onChange={e=>setForm({...form, estampillas: e.target.value})} />
                            </div>
                            <div className="card" style={{background:'#0C447C', color:'white'}}>
                                <h3>Neto Estimado</h3>
                                <p>ReteFuente: -${vRf.toLocaleString()}</p>
                                <p>ReteICA: -${vIca.toLocaleString()}</p>
                                <p>Estampillas: -${vEst.toLocaleString()}</p>
                                <hr/>
                                <h2>CAJA NETO: ${neto.toLocaleString()}</h2>
                                <div className="grid">
                                    <button style={{padding:'10px', borderRadius:'5px', cursor:'pointer'}}>📊 EXCEL SIEL</button>
                                    <button style={{padding:'10px', borderRadius:'5px', cursor:'pointer'}}>📄 PDF VEREDICTO</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
