<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIEL PRO 2.0</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #F1F5F9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; color: #334155; }
        .container { max-width: 1100px; margin: 0 auto; }
        header { background: #0C447C; color: white; padding: 25px; border-radius: 15px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        nav { display: flex; gap: 10px; margin-bottom: 25px; flex-wrap: wrap; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; color: white; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #e2e8f0; font-size: 14px; box-sizing: border-box; }
        .badge { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .pass { background: #dcfce7; color: #166534; }
        .fail { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [tab, setTab] = useState('FINANCIERO');
            const [datos, setDatos] = useState({
                activos: 0, pasivos: 0, utilidadOp: 0, gastosInt: 0,
                valorContrato: 0, tarifaIca: 9.66, analisisIA: "",
                contratos: [{ id: 1, objeto: "", valorSmmlv: 0 }]
            });

            // Cálculos
            const liq = datos.pasivos > 0 ? (Number(datos.activos) / Number(datos.pasivos)).toFixed(2) : 0;
            const end = datos.activos > 0 ? ((Number(datos.pasivos) / Number(datos.activos)) * 100).toFixed(1) : 0;
            const cob = datos.gastosInt > 0 ? (Number(datos.utilidadOp) / Number(datos.gastosInt)).toFixed(2) : 0;

            const calcularRet = () => {
                const base = Number(datos.valorContrato) || 0;
                const ica = (base * Number(datos.tarifaIca)) / 1000;
                const renta = base * 0.04;
                return { ica, renta, neto: base - ica - renta };
            };

            const ret = calcularRet();

            return (
                <div className="container">
                    <header>
                        <div>
                            <h1 style={{margin:0, fontSize:'24px'}}>SIEL PRO 2.0</h1>
                            <small>Consultoría Estratégica en Contratación</small>
                        </div>
                        <span className="badge" style={{background:'rgba(255,255,255,0.2)'}}>UVT 2026: $52.374</span>
                    </header>

                    <nav>
                        <button className="btn" style={{background: tab==='FINANCIERO'?'#1D9E75':'#94a3b8'}} onClick={()=>setTab('FINANCIERO')}>📊 FINANCIERO</button>
                        <button className="btn" style={{background: tab==='EXP'?'#1D9E75':'#94a3b8'}} onClick={()=>setTab('EXP')}>📜 EXPERIENCIA</button>
                        <button className="btn" style={{background: tab==='RETEN'?'#1D9E75':'#94a3b8'}} onClick={()=>setTab('RETEN')}>💰 RETENCOL</button>
                        <button className="btn" style={{background: tab==='IA'?'#1D9E75':'#94a3b8'}} onClick={()=>setTab('IA')}>🔍 AMARRES IA</button>
                    </nav>

                    {tab === 'FINANCIERO' && (
                        <div className="grid">
                            <div className="card">
                                <h3>Indicadores RUP</h3>
                                <label>Activo Corriente</label>
                                <input type="number" value={datos.activos} onChange={e=>setDatos({...datos, activos: e.target.value})} />
                                <label>Pasivo Corriente</label>
                                <input type="number" value={datos.pasivos} onChange={e=>setDatos({...datos, pasivos: e.target.value})} />
                                <label>Utilidad Operativa</label>
                                <input type="number" value={datos.utilidadOp} onChange={e=>setDatos({...datos, utilidadOp: e.target.value})} />
                                <label>Gastos Interés</label>
                                <input type="number" value={datos.gastosInt} onChange={e=>setDatos({...datos, gastosInt: e.target.value})} />
                            </div>
                            <div className="card" style={{background:'#f8fafc'}}>
                                <h3>Veredicto Habilitante</h3>
                                <p>Liquidez: <span className={`badge ${liq >= 1.2 ? 'pass' : 'fail'}`}>{liq}</span></p>
                                <p>Endeudamiento: <span className={`badge ${end <= 70 ? 'pass' : 'fail'}`}>{end}%</span></p>
                                <p>Cobertura: <span className={`badge ${cob >= 2 ? 'pass' : 'fail'}`}>{cob}</span></p>
                            </div>
                        </div>
                    )}

                    {tab === 'EXP' && (
                        <div className="card">
                            <h3>Experiencia en SMMLV</h3>
                            {datos.contratos.map((c, i) => (
                                <div key={c.id} className="grid" style={{marginBottom:'10px'}}>
                                    <input placeholder="Objeto" />
                                    <input type="number" placeholder="SMMLV" />
                                </div>
                            ))}
                            <button className="btn" style={{background:'#0C447C'}} onClick={()=>setDatos({...datos, contratos: [...datos.contratos, {id: Date.now()}]})}>+ Añadir</button>
                        </div>
                    )}

                    {tab === 'RETEN' && (
                        <div className="grid">
                            <div className="card">
                                <h3>Calculadora</h3>
                                <input type="number" placeholder="Valor Contrato" onChange={e=>setDatos({...datos, valorContrato: e.target.value})} />
                                <input type="number" placeholder="Tarifa ICA" value={datos.tarifaIca} onChange={e=>setDatos({...datos, tarifaIca: e.target.value})} />
                            </div>
                            <div className="card" style={{background:'#0C447C', color:'white'}}>
                                <h3>Neto: ${ret.neto.toLocaleString()}</h3>
                                <small>Renta: -${ret.renta.toLocaleString()}</small><br/>
                                <small>ICA: -${ret.ica.toLocaleString()}</small>
                            </div>
                        </div>
                    )}

                    {tab === 'IA' && (
                        <div className="card">
                            <h3>Informe de Amarres</h3>
                            <textarea style={{height:'150px'}} placeholder="Pega el análisis aquí..." onChange={e=>setDatos({...datos, analisisIA: e.target.value})} />
                            <button className="btn" style={{background:'#e11d48', width:'100%'}} onClick={()=>alert('Imprima esta pantalla como PDF para su cliente.')}>GENERAR REPORTE</button>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
