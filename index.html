<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIEL PRO - Consultoría Senior</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root { --blue: #0C447C; --green: #1D9E75; --gray: #F1F5F9; }
        body { background-color: var(--gray); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; color: #334155; }
        .container { max-width: 1100px; margin: 0 auto; }
        header { background: var(--blue); color: white; padding: 25px; border-radius: 15px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        nav { display: flex; gap: 10px; margin-bottom: 25px; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.3s; color: white; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #e2e8f0; font-size: 14px; }
        .badge { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .pass { background: #dcfce7; color: #166534; }
        .fail { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [tab, setTab] = useState('PERFIL');
            const [datos, setDatos] = useState({
                empresa: "Mi Empresa Contratista",
                activos: 0, pasivos: 0, utilidadOp: 0, gastosInt: 0,
                valorContrato: 0, tarifaIca: 9.66, analisisIA: "",
                contratos: [{ id: 1, objeto: "", valorSmmlv: 0 }]
            });

            // Cálculos Financieros
            const liq = datos.pasivos > 0 ? (datos.activos / datos.pasivos).toFixed(2) : 0;
            const end = datos.activos > 0 ? ((datos.pasivos / datos.activos) * 100).toFixed(1) : 0;
            const cob = datos.gastosInt > 0 ? (datos.utilidadOp / datos.gastosInt).toFixed(2) : 0;

            const calcularRetencol = () => {
                const base = Number(datos.valorContrato) || 0;
                const ica = (base * datos.tarifaIca) / 1000;
                const renta = base * 0.04;
                return { ica, renta, neto: base - ica - renta };
            };

            const ret = calcularRetencol();

            return (
                <div className="container">
                    <header>
                        <div>
                            <h1 style={{margin:0, fontSize:'24px'}}>SIEL PRO 2.0</h1>
                            <small>Consultoría Estratégica en Contratación</small>
                        </div>
                        <div style={{textAlign:'right'}}>
                            <span className="badge" style={{background:'rgba(255,255,255,0.2)'}}>UVT 2026: $52.374</span>
                        </div>
                    </header>

                    <nav>
                        <button className="btn" style={{background: tab==='PERFIL'?var(--green):'#94a3b8'}} onClick={()=>setTab('PERFIL')}>📊 FINANCIERO</button>
                        <button className="btn" style={{background: tab==='EXP'?var(--green):'#94a3b8'}} onClick={()=>setTab('EXP')}>📜 EXPERIENCIA</button>
                        <button className="btn" style={{background: tab==='RETEN'?var(--green):'#94a3b8'}} onClick={()=>setTab('RETEN')}>💰 RETENCOL</button>
                        <button className="btn" style={{background: tab==='IA'?var(--green):'#94a3b8'}} onClick={()=>setTab('IA')}>🔍 AMARRES IA</button>
                    </nav>

                    {tab === 'PERFIL' && (
                        <div className="grid">
                            <div className="card">
                                <h3>Indicadores Habilitantes</h3>
                                <label>Activo Corriente</label>
                                <input type="number" onChange={e=>setDatos({...datos, activos: e.target.value})} />
                                <label>Pasivo Corriente</label>
                                <input type="number" onChange={e=>setDatos({...datos, pasivos: e.target.value})} />
                                <label>Utilidad Operativa</label>
                                <input type="number" onChange={e=>setDatos({...datos, utilidadOp: e.target.value})} />
                                <label>Gastos de Intereses</label>
                                <input type="number" onChange={e=>setDatos({...datos, gastosInt: e.target.value})} />
                            </div>
                            <div className="card" style={{background:'#f8fafc'}}>
                                <h3>Resultado RUP</h3>
                                <div style={{marginBottom:'15px'}}>
                                    <strong>Liquidez:</strong> <span className={`badge ${liq >= 1.2 ? 'pass' : 'fail'}`}>{liq}</span>
                                    <small style={{display:'block'}}>Meta sugerida: > 1.2</small>
                                </div>
                                <div style={{marginBottom:'15px'}}>
                                    <strong>Endeudamiento:</strong> <span className={`badge ${end <= 70 ? 'pass' : 'fail'}`}>{end}%</span>
                                    <small style={{display:'block'}}>Meta sugerida: < 70%</small>
                                </div>
                                <div>
                                    <strong>Cobertura Interés:</strong> <span className={`badge ${cob >= 2 ? 'pass' : 'fail'}`}>{cob}</span>
                                    <small style={{display:'block'}}>Meta sugerida: > 2.0</small>
                                </div>
                            </div>
                        </div>
                    )}

                    {tab === 'EXP' && (
                        <div className="card">
                            <h3>Validación de Experiencia (SMMLV)</h3>
                            <p>Registre sus contratos más importantes para validar contra el pliego.</p>
                            {datos.contratos.map((con, i) => (
                                <div key={con.id} className="grid" style={{borderBottom:'1px solid #eee', paddingBottom:'10px', marginBottom:'10px'}}>
                                    <input placeholder="Objeto del contrato" />
                                    <input type="number" placeholder="Valor en SMMLV" />
                                </div>
                            ))}
                            <button className="btn" style={{background:var(--blue)}} onClick={()=>setDatos({...datos, contratos: [...datos.contratos, {id: Date.now()}]})}>+ Agregar Contrato</button>
                        </div>
                    )}

                    {tab === 'RETEN' && (
                        <div className="grid">
                            <div className="card">
                                <h3>Calculadora Retencol</h3>
                                <label>Valor del Contrato</label>
                                <input type="number" onChange={e=>setDatos({...datos, valorContrato: e.target.value})} />
                                <label>Tarifa ICA (X mil)</label>
                                <input type="number" value={datos.tarifaIca} onChange={e=>setDatos({...datos, tarifaIca: e.target.value})} />
                                <button className="btn" style={{background:'#64748b', width:'100%', marginTop:'10px'}} onClick={()=>window.open('https://sites.google.com/view/estatuton-2024/inicio')}>Consultar Estatutón</button>
                            </div>
                            <div className="card" style={{background:var(--blue), color:'white'}}>
                                <h3>Proyección de Pago</h3>
                                <p>Retención Fuente (4%): -${ret.renta.toLocaleString()}</p>
                                <p>ReteICA: -${ret.ica.toLocaleString()}</p>
                                <hr/>
                                <h2 style={{color:var(--green)}}>NETO A RECIBIR: ${ret.neto.toLocaleString()}</h2>
                            </div>
                        </div>
                    )}

                    {tab === 'IA' && (
                        <div className="card">
                            <h3>Análisis de Riesgos y Amarres</h3>
                            <textarea style={{height:'200px'}} placeholder="Pegue aquí el análisis generado por la IA para incluirlo en el reporte final..." onChange={e=>setDatos({...datos, analisisIA: e.target.value})} />
                            <button className="btn" style={{background:'#e11d48', width:'100%'}} onClick={()=>alert('Generando reporte PDF...')}>GENERAR INFORME DE VIABILIDAD PDF</button>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
