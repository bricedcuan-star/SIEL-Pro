<div id="tab-tax" class="card">
        <div class="section-title">RETENCOL 360 & PERFIL RUT</div>
        <div style="display:grid; grid-template-columns: 1.2fr 1fr; gap:25px;">
            <div>
                <div class="form-section" style="border-left: 5px solid var(--gold);">
                    <label><i class="fas fa-file-invoice"></i> Configuración según RUT</label>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                        <select id="t_regimen" onchange="calcAll()">
                            <option value="comun">Régimen Ordinario</option>
                            <option value="simple">Régimen Simple (RST)</option>
                        </select>
                        <select id="t_calidad" onchange="calcAll()">
                            <option value="ninguno">Persona Jurídica/Natural</option>
                            <option value="gc">Gran Contribuyente (R-13)</option>
                            <option value="autorete">Autorretenedor (R-15)</option>
                        </select>
                    </div>
                    <div style="margin-top:10px;">
                        <label>Responsabilidades RUT (Párrafo explicativo para auditoría)</label>
                        <input type="text" id="t_rut_codes" placeholder="Ej: 05, 07, 09, 14, 42, 48" oninput="updatePrompt()">
                    </div>
                </div>

                <div class="form-section">
                    <label>Estatutón (Tasas Municipales)</label>
                    <a href="https://sites.google.com/view/estatuton-2024/inicio" target="_blank" style="display:block; background:black; color:var(--gold); text-align:center; padding:10px; border-radius:8px; text-decoration:none; font-weight:bold; margin-bottom:15px;">ABRIR ESTATUTÓN 2024</a>
                    
                    <label>¿Aplica AIU?</label>
                    <select id="t_aplica_aiu" onchange="toggleAIU()">
                        <option value="no">NO - Contrato General</option>
                        <option value="si">SÍ - Contrato con AIU</option>
                    </select>
                </div>

                <div id="aiu_fields" class="form-section" style="display:none; border-left: 5px solid var(--success);">
                    <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px;">
                        <div><label>Adm %</label><input type="number" id="t_a" value="0" oninput="calcAll()"></div>
                        <div><label>Imp %</label><input type="number" id="t_i" value="0" oninput="calcAll()"></div>
                        <div><label>Util %</label><input type="number" id="t_u" value="0" oninput="calcAll()"></div>
                    </div>
                </div>

                <div class="form-section">
                    <label>Tipo de Pago / Contrato</label>
                    <select id="t_tipo" onchange="calcAll()">
                        <option value="servicios">Servicios (4%/6%)</option>
                        <option value="honorarios">Honorarios (11%/10%)</option>
                        <option value="obra">Obra (2%)</option>
                        <option value="compras">Compras (2.5%/3.5%)</option>
                    </select>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                        <div><label>Estampillas (%)</label><input type="number" id="t_estampillas" value="2.5" oninput="calcAll()"></div>
                        <div><label>ICA (x1000)</label><input type="number" id="t_ica" value="9.66" oninput="calcAll()"></div>
                    </div>
                </div>
            </div>

            <div class="tax-display">
                <div class="tax-row"><span>Base:</span><span id="res_base">$0</span></div>
                <div class="tax-row"><span>IVA:</span><span id="res_iva">$0</span></div>
                <div class="tax-row"><span>ReteFuente:</span><span id="res_rf">-$0</span></div>
                <div class="tax-row"><span>ReteICA:</span><span id="res_rica">-$0</span></div>
                <div class="tax-row"><span>Estampillas:</span><span id="res_est">-$0</span></div>
                <hr style="border: 0; border-top: 1px solid #334155; margin: 15px 0;">
                <div class="tax-row" style="color:var(--gold);"><span>Perfil Fiscal:</span><span id="res_perfil">Ordinario</span></div>
                <div class="tax-total" id="res_neto">$0</div>
            </div>
        </div>
    </div>

<script>
    function calcAll() {
        const base = parseFloat(document.getElementById('r_valor').value) || 0;
        const aplicaAIU = document.getElementById('t_aplica_aiu').value;
        const u = parseFloat(document.getElementById('t_u').value) || 0;
        const regimen = document.getElementById('t_regimen').value;
        const calidad = document.getElementById('t_calidad').value;
        const tipo = document.getElementById('t_tipo').value;
        const estPct = parseFloat(document.getElementById('t_estampillas').value) || 0;
        const icaTarifa = parseFloat(document.getElementById('t_ica').value) || 0;

        // 1. IVA Dinámico
        let iva = (aplicaAIU === 'si' && u > 0) ? (base * (u/100) * 0.19) : (base * 0.19);
        
        // 2. Lógica ReteFuente según RUT
        let rfTasa = 0;
        if (regimen === 'simple') {
            rfTasa = 0; // Al Régimen Simple no se le practica ReteFuente
        } else if (calidad === 'autorete') {
            rfTasa = 0; // Los autorretenedores se la practican ellos mismos, no se les descuenta en factura
        } else {
            if(tipo === 'servicios') rfTasa = 0.04;
            if(tipo === 'honorarios') rfTasa = 0.11;
            if(tipo === 'obra') rfTasa = 0.02;
            if(tipo === 'compras') rfTasa = 0.025;
        }

        let vRf = base * rfTasa;
        let vIca = (base * icaTarifa) / 1000;
        let vEst = base * (estPct / 100);
        
        // El ReteICA también se omite en ciertos casos de RST dependiendo del municipio
        if (regimen === 'simple') vIca = 0; 

        let neto = (base + iva) - (vRf + vIca + vEst);

        // Actualizar UI
        document.getElementById('res_base').innerText = "$ " + base.toLocaleString();
        document.getElementById('res_iva').innerText = "$ " + Math.round(iva).toLocaleString();
        document.getElementById('res_rf').innerText = "-$ " + Math.round(vRf).toLocaleString();
        document.getElementById('res_rica').innerText = "-$ " + Math.round(vIca).toLocaleString();
        document.getElementById('res_est').innerText = "-$ " + Math.round(vEst).toLocaleString();
        document.getElementById('res_neto').innerText = "$ " + Math.round(neto).toLocaleString();
        document.getElementById('res_perfil').innerText = (regimen === 'simple' ? 'Régimen Simple' : 'Ordinario') + (calidad === 'gc' ? ' + GC' : '');

        // Dashboard Excel
        document.getElementById('ex_neto').innerText = "$ " + Math.round(neto).toLocaleString();
        document.getElementById('ex_iva').innerText = "$ " + Math.round(iva).toLocaleString();
    }
</script>
