<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SIEL PRO V12.5 | ESTRATEGIA PARA GANAR</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --critico: #e11d48; 
            --importante: #f59e0b; 
            --observacion: #3b82f6; 
            --go: #10b981; 
            --azul-p: #061624; 
            --azul-s: #0C2D48; 
            --oro: #D4AF37; 
            --fondo: #f8fafc; 
        }
        
        body { 
            font-family: 'Lexend', sans-serif; 
            background: var(--fondo); 
            margin: 0; 
            color: #1e293b; 
            padding-bottom: 60px; 
        }
        
        header { 
            background: linear-gradient(135deg, var(--azul-p) 0%, var(--azul-s) 100%); 
            color: white; 
            padding: 20px 40px; 
            border-bottom: 4px solid var(--oro); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        
        .search-bar { 
            display: flex; 
            gap: 10px; 
            margin: 20px auto; 
            max-width: 1150px; 
            padding: 0 20px; 
        }
        
        .search-btn { 
            flex: 1; 
            padding: 12px; 
            border-radius: 10px; 
            background: white; 
            border: 1.5px solid var(--oro); 
            color: var(--azul-s); 
            text-decoration: none; 
            font-size: 11px; 
            font-weight: 800; 
            text-align: center; 
            transition: 0.3s; 
        }
        
        .search-btn:hover { 
            background: var(--oro); 
            color: var(--azul-p); 
        }

        .container { 
            max-width: 1150px; 
            margin: 0 auto; 
            padding: 0 20px; 
            display: grid; 
            grid-template-columns: 1fr 1.3fr; 
            gap: 25px; 
        }

        .card { 
            background: white; 
            border-radius: 20px; 
            padding: 25px; 
            margin-bottom: 20px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.04); 
            border: 1px solid #e2e8f0;
        }

        .decision-hero { 
            grid-column: 1 / -1; 
            background: white; 
            border-radius: 20px; 
            padding: 30px; 
            text-align: center; 
            border: 3px solid #cbd5e1; 
            margin-bottom: 10px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.04); 
        }

        .prompt-box { 
            background: var(--azul-p); 
            color: #a5b4fc; 
            padding: 15px; 
            border-radius: 12px; 
            border: 1px dashed var(--oro); 
            margin-top: 15px; 
            font-size: 10px; 
        }

        label { 
            display: block; 
            font-weight: 800; 
            font-size: 11px; 
            color: var(--azul-s); 
            margin-bottom: 8px; 
            text-transform: uppercase; 
        }
        
        textarea, input, select { 
            width: 100%; 
            padding: 12px; 
            border: 2px solid #e2e8f0; 
            border-radius: 10px; 
            font-family: inherit; 
            font-size: 13px; 
            box-sizing: border-box; 
            margin-bottom: 8px; 
        }
        
        .btn-magic { 
            background: var(--azul-p); 
            color: white; 
            padding: 12px; 
            border: none; 
            border-radius: 10px; 
            font-weight: 800; 
            cursor: pointer; 
            width: 100%; 
            margin-bottom: 10px; 
        }
        
        .btn-premium { 
            grid-column: 1 / -1; 
            background: var(--oro); 
            color: var(--azul-p); 
            padding: 22px; 
            border: none; 
            border-radius: 50px; 
            width: 100%; 
            font-weight: 900; 
            font-size: 18px; 
            cursor: pointer; 
            box-shadow: 0 10px 25px rgba(212,175,55,0.3); 
            text-transform: uppercase; 
            margin-top: 10px; 
        }
    </style>
</head>
<body>

<header>
    <div><span style="font-weight: 800; font-size: 24px;">SIEL PRO</span> <span style="color: var(--oro); font-weight: 300;">V12.5</span></div>
    <div style="text-align: right; font-size: 12px;">BRICED CONSULTING<br><b>INTELIGENCIA ESTRATÉGICA PARA GANAR</b></div>
</header>

<div class="search-bar">
    <a href="https://www.contratos.gov.co" target="_blank" class="search-btn"><i class="fas fa-search"></i> SECOP I</a>
    <a href="https://community.secop.gov.co" target="_blank" class="search-btn"><i class="fas fa-project-diagram"></i> SECOP II</a>
    <a href="https://bogota.gov.co" target="_blank" class="search-btn"><i class="fas fa-city"></i> BOGOTÁ</a>
    <a href="https://leydepropiedadhorizontal.org" target="_blank" class="search-btn"><i class="fas fa-building"></i> P.H.</a>
</div>

<div class="container">
    
    <div class="decision-hero" id="hero_box">
        <label>🎯 DECISIÓN ESTRATÉGICA FINAL</label>
        <select id="f_dec" onchange="updateColors()" style="font-size: 24px; font-weight: 900; text-align: center; border: none; background: transparent;">
            <option value="GO">🟢 GO - PRESENTARSE</option>
            <option value="COND">🟡 GO CONDICIONADO</option>
            <option value="NOGO">🔴 NO GO - NO VIABLE</option>
        </select>
        <input type="text" id="f_motivo" placeholder="Resumen estratégico de viabilidad" style="text-align: center; font-style: italic; border:none; border-bottom: 1px solid #e2e8f0; font-size: 14px;">
    </div>

    <div>
        <div class="card">
            <label>1. ANÁLISIS DE LA IA (INPUT)</label>
            <textarea id="f_raw" rows="18" placeholder="Pega el análisis generado por la IA..." oninput="autoScan()"></textarea>
            <button class="btn-magic" onclick="autoScan()">AUTO-LLENADO INTELIGENTE <i class="fas fa-magic"></i></button>
            
            <div class="prompt-box">
                <p id="pText" style="margin:0;">"Actúa como auditor y estratega de licitaciones. Resume en: Resumen, Alertas Críticas, Alertas Importantes, Alertas de Mejora y Concepto de Estrategia para ganar."</p>
                <button onclick="navigator.clipboard.writeText(document.getElementById('pText').innerText); alert('Copiado');" style="background:var(--oro); border:none; padding:5px 10px; border-radius:5px; cursor:pointer; margin-top:8px; font-weight:800; font-size:9px;">COPIAR PROMPT MAESTRO</button>
            </div>
        </div>
    </div>

    <div>
        <div class="card">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div>
                    <label>Objeto del Proceso</label>
                    <input type="text" id="f_nom" placeholder="Proyecto Licitación">
                </div>
                <div>
                    <label>Entidad Contratante</label>
                    <input type="text" id="f_ent" placeholder="Nombre de la entidad">
                </div>
            </div>

            <label style="margin-top:15px">🧠 RESUMEN EJECUTIVO (GERENCIAL)</label>
            <textarea id="f_res" rows="3" placeholder="Síntesis breve que justifica la viabilidad del proceso."></textarea>
            
            <label style="margin-top:15px">⚠️ ALERTAS CLASIFICADAS</label>
            <textarea id="f_alertas" rows="6" placeholder="Críticas, Importantes y Mejoras extraídas de la IA."></textarea>

            <label style="margin-top:15px">🎯 ESTRATEGIA DE GANANCIA Y VALOR AGREGADO</label>
            <textarea id="f_estrat" rows="6" placeholder="Escribe el plan que neutralizará los riesgos y destacará tu oferta..."></textarea>
        </div>
    </div>

    <button class="btn-premium" onclick="exportSIELPDF()"><i class="fas fa-file-pdf"></i> GENERAR INFORME PROFESIONAL (V12.5)</button>
</div>

<script>
    function updateColors() {
        const d = document.getElementById('f_dec').value;
        const h = document.getElementById('hero_box');
        if(d === 'GO') h.style.borderColor = '#10b981';
        else if(d === 'COND') h.style.borderColor = '#f59e0b';
        else h.style.borderColor = '#e11d48';
    }

    function autoScan() {
        const text = document.getElementById('f_raw').value;
        if(!text) return;

        // 1. Detección de decisión automática
        if(text.includes("NO GO") || text.includes("NOGO") || text.includes("NO VIABLE")) {
            document.getElementById('f_dec').value = "NOGO";
        } else if(text.includes("CONDICIONADO") || text.includes("DUDOSO")) {
            document.getElementById('f_dec').value = "COND";
        } else {
            document.getElementById('f_dec').value = "GO";
        }
        updateColors();

        // 2. Extraer Resumen
        const resMatch = text.match(/(?:RESUMEN EJECUTIVO|Conclusión ejecutiva|RESUMEN):?\s*([\s\S]*?)(?=\n\n|\d\.|ALERTAS|HALLAZGOS)/i);
        if(resMatch) document.getElementById('f_res').value = resMatch[1].trim().substring(0, 250);

        // 3. Extraer Alertas (Reagrupamiento inteligente de lo que impacta la oferta)
        const alertsMatch = text.match(/(?:ALERTAS CRÍTICAS|ALERTAS|HALLAZGOS):?\s*([\s\S]*?)(?=ESTRATEGIA|RECOMENDACIONES|CONCEPTO)/i);
        if(alertsMatch) document.getElementById('f_alertas').value = alertsMatch[1].trim();

        // 4. Extraer Estrategia
        const stratMatch = text.match(/(?:ESTRATEGIA|RECOMENDACIONES PARA GANAR|CLAVE PARA GANAR):?\s*([\s\S]*?)$/i);
        if(stratMatch) document.getElementById('f_estrat').value = stratMatch[1].trim();
        
        // 5. Motivo corto de la decisión
        document.getElementById('f_motivo').value = "Proceso procesado y listo para validación de estrategia.";
    }

    function exportSIELPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        const nom = (document.getElementById('f_nom').value || "PROCESO").toUpperCase();
        const ent = (document.getElementById('f_ent').value || "ENTIDAD").toUpperCase();
        const dec = document.getElementById('f_dec').options[document.getElementById('f_dec').selectedIndex].text;
        const mot = document.getElementById('f_motivo').value;
        const res = document.getElementById('f_res').value;
        const alertas = document.getElementById('f_alertas').value;
        const estrat = document.getElementById('f_estrat').value;
        
        // DISEÑO DEL ENCABEZADO
        doc.setFillColor(6, 22, 36); 
        doc.rect(0, 0, 210, 45, 'F');
        doc.setTextColor(212, 175, 55); 
        doc.setFontSize(18); 
        doc.setFont("helvetica", "bold");
        doc.text("REPORTE DE AUDITORÍA ESTRATÉGICA SIEL", 105, 20, { align: "center" });
        doc.setTextColor(255); 
        doc.setFontSize(11); 
        doc.text(dec, 105, 35, { align: "center" });

        // INFORMACIÓN BÁSICA
        doc.setTextColor(12, 45, 72); 
        doc.setFontSize(9);
        doc.text("PROYECTO: " + nom, 20, 55);
        doc.text("ENTIDAD: " + ent, 20, 62);

        // LÓGICA DE PAGINACIÓN SEGURA
        let y = 75;

        const addSection = (title, content) => {
            if (y > 240) {
                doc.addPage();
                y = 20;
            }
            doc.setFont("helvetica", "bold");
            doc.setTextColor(12, 45, 72);
            doc.setFontSize(11);
            doc.text(title, 20, y);
            doc.line(20, y+2, 190, y+2);
            y += 8;
            
            doc.setFont("helvetica", "normal");
            doc.setFontSize(9);
            const lines = doc.splitTextToSize(content || "Sin información procesada.", 170);
            
            lines.forEach(line => {
                if (y > 275) {
                    doc.addPage();
                    y = 20;
                }
                doc.text(line, 20, y);
                y += 5;
            });
            y += 5;
        };

        addSection("1. RESUMEN EJECUTIVO (GERENCIA)", res);
        addSection("2. ALERTAS Y RIESGOS DETECTADOS", alertas);
        addSection("3. ESTRATEGIA PARA GANAR Y VALOR AGREGADO", estrat);

        // PIE DE PÁGINA
        const totalPages = doc.internal.getNumberOfPages();
        for (let i = 1; i <= totalPages; i++) {
            doc.setPage(i);
            doc.setFontSize(7); 
            doc.setTextColor(150);
            doc.text(`Briced Consulting © 2026 - Informe SIEL PRO - Página ${i} de ${totalPages}`, 105, 290, { align: "center" });
        }

        doc.save(`Reporte_Estrategico_${nom.substring(0, 15)}.pdf`);
    }
</script>
</body>
</html>
