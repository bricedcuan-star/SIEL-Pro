<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SIEL PRO V8.1 | EDICIÓN EDITABLE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --azul: #0C2D48; --oro: #D4AF37; --fondo: #f4f7f6; }
        body { font-family: 'Lexend', sans-serif; background: var(--fondo); margin: 0; padding: 0; }
        .header { background: var(--azul); color: white; padding: 20px; text-align: center; border-bottom: 4px solid var(--oro); }
        .container { max-width: 800px; margin: 30px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        label { display: block; font-weight: bold; margin-top: 15px; color: var(--azul); font-size: 13px; }
        input, textarea, select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; font-family: inherit; box-sizing: border-box; }
        .btn-download { background: var(--azul); color: white; border: none; padding: 15px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 20px; font-size: 16px; }
        .btn-download:hover { background: #1a4a73; }
        .copy-box { background: #eef2f3; padding: 10px; border-radius: 5px; font-size: 11px; margin-top: 10px; border-left: 3px solid var(--oro); }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin:0;">SIEL PRO V8.1</h2>
    <p style="margin:0; font-size: 12px; opacity: 0.8;">PREPARADO PARA CONVERSIÓN A WORD</p>
</div>

<div class="container">
    <label>PROYECTO / OBJETO</label>
    <input type="text" id="nombre" placeholder="Ej: Servicios de Aseo">

    <label>ENTIDAD</label>
    <input type="text" id="entidad" placeholder="Ej: Conjunto Residencial">

    <div class="copy-box">
        <strong>PROMPT MAESTRO:</strong><br>
        <span id="pText">Analiza este pliego bajo los 13 puntos SIEL. Divide en: 1. HALLAZGOS y 2. RECOMENDACIONES. Usa tildes y ñ con normalidad.</span>
        <br>
        <button onclick="copyPrompt()" style="margin-top:5px; font-size:10px; cursor:pointer;">Copiar</button>
    </div>

    <label>CONTENIDO DEL ANÁLISIS (IA)</label>
    <textarea id="analisis" rows="10" placeholder="Pega aquí el resultado de la IA..."></textarea>

    <label>DECISIÓN</label>
    <select id="decision">
        <option value="GO - PRESENTARSE">GO - PRESENTARSE</option>
        <option value="NO GO - NO VIABLE">NO GO - NO VIABLE</option>
    </select>

    <button class="btn-download" onclick="exportPDF()">DESCARGAR PARA EDITAR EN WORD</button>
</div>

<script>
    function copyPrompt() {
        navigator.clipboard.writeText(document.getElementById('pText').innerText);
        alert("Prompt copiado");
    }

    function exportPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        // Datos
        const nombre = document.getElementById('nombre').value.toUpperCase();
        const entidad = document.getElementById('entidad').value.toUpperCase();
        const analisis = document.getElementById('analisis').value;
        const decision = document.getElementById('decision').value;

        // Formato sobrio (Fácil de convertir a Word)
        doc.setFont("helvetica", "bold");
        doc.setFontSize(16);
        doc.text("INFORME ESTRATÉGICO DE LICITACIÓN", 105, 20, { align: "center" });
        
        doc.setFontSize(10);
        doc.text("BRICED CONSULTING - SIEL PRO", 105, 27, { align: "center" });
        doc.line(20, 32, 190, 32);

        // Ficha Técnica
        doc.setFontSize(11);
        doc.text("INFORMACIÓN GENERAL", 20, 45);
        doc.setFont("helvetica", "normal");
        doc.text("PROYECTO: " + nombre, 20, 52);
        doc.text("ENTIDAD: " + entidad, 20, 59);
        doc.setFont("helvetica", "bold");
        doc.text("CONCEPTO FINAL: " + decision, 20, 66);

        // Análisis
        doc.text("ANÁLISIS DETALLADO", 20, 80);
        doc.line(20, 82, 190, 82);
        
        doc.setFont("helvetica", "normal");
        doc.setFontSize(10);
        
        // splitTextToSize ahora procesará tildes mejor en fuentes estándar
        const lines = doc.splitTextToSize(analisis, 170);
        let y = 90;

        lines.forEach(line => {
            if (y > 280) { doc.addPage(); y = 20; }
            doc.text(line, 20, y);
            y += 6;
        });

        // Salvedad
        if (y > 250) { doc.addPage(); y = 20; }
        y += 10;
        doc.setFont("helvetica", "italic");
        doc.setFontSize(8);
        doc.text("Nota: Este informe es una herramienta de apoyo y no constituye asesoría jurídica vinculante.", 20, y);

        doc.save("Informe_Para_Word.pdf");
    }
</script>
</body>
</html>
