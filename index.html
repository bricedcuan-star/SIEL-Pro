<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SIEL PRO - Sistema Unificado por Fases</title>
    <style>
        :root {
            --azul-p: #061624;
            --oro: #D4AF37;
            --fondo: #f8fafc;
        }
        body { font-family: 'Lexend', sans-serif; background: var(--fondo); margin: 0; padding: 20px; }
        .card { background: white; border-radius: 15px; padding: 20px; margin-bottom: 20px; border: 1px solid #edf2f7; }
        .bloqueado { opacity: 0.6; pointer-events: none; }
        .plan-header { background: var(--azul-p); color: white; padding: 10px; border-radius: 8px; text-align: center; }
    </style>
</head>
<body>

    <div class="plan-header">
        <h2>SIEL PRO - ESTRUCTURA UNIFICADA</h2>
    </div>

    <div class="card">
        <h3>🟢 Fase 1: Plan Básico (Viabilidad)</h3>
        <label>Ingresa el texto del proceso:</label>
        <textarea id="f_raw" rows="6" placeholder="Pega aquí el resultado..." oninput="procesarFaseBasica()"></textarea>
        <p id="resultado_viabilidad">Resultado: Esperando datos...</p>
    </div>

    <div class="card" id="fase2_contenedor">
        <h3>🟡 Fase 2: Plan Esencial (Rentabilidad)</h3>
        <label>Margen deseado (%)</label>
        <input type="number" id="f_margen" placeholder="Ej. 15" oninput="procesarFaseEsencial()">
        <p id="resultado_financiero">Completa la fase básica para habilitar.</p>
    </div>

    <div class="card bloqueado" id="fase3_contenedor">
        <h3>🔴 Fase 3: Plan Premium (Estratégico)</h3>
        <p>🔒 Esta función está reservada para suscriptores Premium.</p>
        <button onclick="alert('Actualizando a Premium...');">ACTUALIZAR AHORA</button>
    </div>

<script>
    function procesarFaseBasica() {
        const texto = document.getElementById('f_raw').value;
        if (texto.length > 5) {
            document.getElementById('resultado_viabilidad').innerText = "✅ Viabilidad evaluada correctamente. ¡Puedes avanzar al siguiente nivel!";
            
            // Lógica: Habilitar fase 2 (desbloquear el contenedor)
            const f2 = document.getElementById('fase2_contenedor');
            f2.style.opacity = "1";
            f2.style.pointerEvents = "auto";
        }
    }

    function procesarFaseEsencial() {
        const margen = document.getElementById('f_margen').value;
        if (margen >= 10) {
            document.getElementById('resultado_financiero').innerText = "💰 Rentabilidad aprobada: Margen adecuado.";
        } else if (margen > 0) {
            document.getElementById('resultado_financiero').innerText = "⚠️ Alerta: El margen es bajo para los costos estimados.";
        }
    }
</script>

</body>
</html>
