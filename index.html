<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIEL PRO - Fase 1: Plan Básico</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #F1F5F9; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        header { background: #0C447C; color: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        nav { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .btn { padding: 10px 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input, select, textarea { width: 100%; padding: 10px; margin: 10px 0; border-radius: 6px; border: 1px solid #cbd5e1; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
        table { width: 100%; border-collapse: collapse; margin: 15px 0; }
        th, td { border: 1px solid #cbd5e1; padding: 8px; text-align: left; }
        th { background-color: #f8fafc; }
        .ia-box { background-color: #e6f7ff; border: 1px solid #91d5ff; border-radius: 6px; padding: 15px; margin-top: 15px; }
        .ia-title { color: #0050b3; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [tab, setTab] = useState('PERFIL');
            const [datos, setDatos] = useState({
                miembros: [{ id: 1, nombre: 'Empresa Líder', patrimonio: 0, expMax: 0, unspsc: "", liquidezRequisito: 1.5, coberturaRequisito: 1.2, capitalRequisito: 50000000, cumpleLiquidez: 'si', cumpleCobertura: 'si', cumpleCapital: 'si', cumpleFiltros: 'si' }],
                entidad: '',
                objeto: '',
                presupuesto: 0,
                esEntidadPublica: false,
                esImagen: false,
                analisisIA: "",
                capacidadK: 100000000
            });

            const consolidar = () => {
                let pat = 0, exp = 0;
                datos.miembros.forEach(m => {
                    pat += Number(m.patrimonio) || 0;
                    exp = Math.max(exp, Number(m.expMax) || 0);
                });
                return { pat, exp };
            };

            const evaluarMotorDecision = () => {
                const presupuesto = Number(datos.presupuesto) || 0;
                const kEmpresa = Number(datos.capacidadK) || 0;
                
                let kValido = true;
                if (presupuesto > kEmpresa) {
                    kValido = false;
                }

                let tieneFallas = false;
                let tieneCondicion = false;

                datos.miembros.forEach(m => {
                    if (m.cumpleFiltros === 'no' || !kValido) {
                        tieneFallas = true;
                    }
                    if (m.cumpleLiquidez === 'no' || m.cumpleCobertura === 'no' || m.cumpleCapital === 'no') {
                        tieneCondicion = true;
                    }
                });

                if (tieneFallas) {
                    return {
                        estado: 'NO GO',
                        color: '#ffcccc',
                        textColor: '#990000',
                        mensajeIA: 'El proyecto no cumple con los filtros excluyentes obligatorios o excede la Capacidad K. Se recomienda no presentar oferta para evitar desgaste operativo.'
                    };
                } else if (tieneCondicion) {
                    return {
                        estado: 'GO CONDICIONADO',
                        color: '#fff2cc',
                        textColor: '#996600',
                        mensajeIA: 'Se observa viabilidad legal y experiencia, pero uno o varios indicadores financieros no cumplen con el requerimiento del pliego. Validar riesgos antes de avanzar.'
                    };
                } else {
                    return {
                        estado: 'GO',
                        color: '#ccffcc',
                        textColor: '#006600',
                        mensajeIA: 'El proyecto es viable en todos los filtros evaluados (Capacidad K, experiencia y razones financieras). Se sugiere proceder con la fase de propuesta formal.'
                    };
                }
            };

            const c = consolidar();
            const evaluacion = evaluarMotorDecision();

            return (
                <div className="container">
                    <header>
                        <h2 style={{margin:0}}>SIEL PRO - Fase 1: Plan Básico</h2>
                        <span>UVT 2026: $52.374</span>
                    </header>

                    <nav>
                        <button className="btn" style={{background: tab==='PERFIL'?'#1D9E75':'#94a3b8'}} onClick={() => setTab('PERFIL')}>PERFIL</button>
                        <button className="btn" style={{background: tab==='FINANCIERO'?'#1D9E75':'#94a3b8'}} onClick={() => setTab('FINANCIERO')}>FINANCIERO</button>
                        <button className="btn" style={{background: tab==='IA'?'#1D9E75':'#94a3b8'}} onClick={() => setTab('IA')}>TRAMPAS IA</button>
                    </nav>

                    {tab === 'PERFIL' && (
                        <div className="card">
                            <h3>Perfil & Fuentes de Búsqueda</h3>
                            
                            {/* Fuentes de Búsqueda Oficiales */}
                            <div style={{marginBottom: '20px'}}>
                                <h4>🔗 Fuentes de Búsqueda</h4>
                                <ul>
                                    <li><a href="https://bogota.gov.co/asi-vamos/contratos-y-obras/participa" target="_blank">Alcaldía Mayor de Bogotá - Contratos</a></li>
                                    <li><a href="https://leydepropiedadhorizontal.org/category/convocatorias/" target="_blank">Convocatorias Propiedad Horizontal</a></li>
                                    <li>Secop I</li>
                                    <li>Secop II</li>
                                </ul>
                            </div>

                            {datos.miembros.map((m, i) => (
                                <div key={m.id} style={{borderBottom:'1px solid #eee', paddingBottom:'10px', marginBottom:'10px'}}>
                                    <input placeholder="Nombre Empresa" value={m.nombre} onChange={e => {
                                        let n = [...datos.miembros]; n[i].nombre = e.target.value; setDatos({...datos, miembros: n});
                                    }} />
                                    <div className="grid">
                                        <input type="number" placeholder="Patrimonio" value={m.patrimonio || ''} onChange={e => {
                                            let n = [...datos.miembros]; n[i].patrimonio = e.target.value; setDatos({...datos, miembros: n});
                                        }} />
                                        <input type="number" placeholder="Experiencia Máxima (años/contratos)" value={m.expMax || ''} onChange={e => {
                                            let n = [...datos.miembros]; n[i].expMax = e.target.value; setDatos({...datos, miembros: n});
                                        }} />
                                    </div>
                                    <input placeholder="Códigos UNSPSC" value={m.unspsc} onChange={e => {
                                        let n = [...datos.miembros]; n[i].unspsc = e.target.value; setDatos({...datos, miembros: n});
                                    }} />
                                </div>
                            ))}
                            
                            <h4>Datos de la Licitación</h4>
                            <div className="grid">
                                <div>
                                    <label>Nombre de la Entidad:</label>
                                    <input value={datos.entidad} onChange={e => setDatos({...datos, entidad: e.target.value})} placeholder="Ej: Alcaldía Mayor" />
                                </div>
                                <div>
                                    <label>Objeto del Proceso:</label>
                                    <input value={datos.objeto} onChange={e => setDatos({...datos, objeto: e.target.value})} placeholder="Ej: Suministro de bienes" />
                                </div>
                            </div>
                            <div className="grid">
                                <div>
                                    <label>Presupuesto Oficial ($):</label>
                                    <input type="number" value={datos.presupuesto || ''} onChange={e => setDatos({...datos, presupuesto: e.target.value})} />
                                </div>
                                <div>
                                    <label>Capacidad de Contratación K de la Empresa ($):</label>
                                    <input type="number" value={datos.capacidadK || ''} onChange={e => setDatos({...datos, capacidadK: e.target.value})} />
                                </div>
                            </div>
                        </div>
                    )}

                    {tab === 'FINANCIERO' && (
                        <div className="card">
                            <h3>Evaluación Financiera y Checklist Legal</h3>
                            <table>
                                <thead>
                                    <tr>
                                        <th>Indicador / Requisito</th>
                                        <th>Valor Exigido por Pliego</th>
                                        <th>¿Cumple?</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {datos.miembros.map((m, i) => (
                                        <React.Fragment key={m.id}>
                                            <tr>
                                                <td>Liquidez Mínima</td>
                                                <td><input type="number" step="0.1" value={m.liquidezRequisito || 1.5} onChange={e => {
                                                    let n = [...datos.miembros]; n[i].liquRequisito = e.target.value; setDatos({...datos, miembros: n});
                                                }} /></td>
                                                <td>
                                                    <select value={m.cumpleLiquidez} onChange={e => {
                                                        let n = [...datos.miembros]; n[i].cumpleLiquidez = e.target.value; setDatos({...datos, miembros: n});
                                                    }}>
                                                        <option value="si">Sí</option>
                                                        <option value="no">No</option>
                                                    </select>
                                                </td>
                                            </tr>
                                            <tr>
                                                <td>Cobertura Mínima</td>
                                                <td><input type="number" step="0.1" value={m.coberRequisito || 1.2} onChange={e => {
                                                    let n = [...datos.miembros]; n[i].coberRequisito = e.target.value; setDatos({...datos, miembros: n});
                                                }} /></td>
                                                <td>
                                                    <select value={m.cumpleCobertura} onChange={e => {
                                                        let n = [...datos.miembros]; n[i].cumpleCobertura = e.target.value; setDatos({...datos, miembros: n});
                                                    }}>
                                                        <option value="si">Sí</option>
                                                        <option value="no">No</option>
                                                    </select>
                                                </td>
                                            </tr>
                                            <tr>
                                                <td>Capital de Trabajo Mínimo</td>
                                                <td><input type="number" value={m.capitalRequisito || 50000000} onChange={e => {
                                                    let n = [...datos.miembros]; n[i].capitalRequisito = e.target.value; setDatos({...datos, miembros: n});
                                                }} /></td>
                                                <td>
                                                    <select value={m.cumpleCapital} onChange={e => {
                                                        let n = [...datos.miembros]; n[i].cumpleCapital = e.target.value; setDatos({...datos, miembros: n});
                                                    }}>
                                                        <option value="si">Sí</option>
                                                        <option value="no">No</option>
                                                    </select>
                                                </td>
                                            </tr>
                                        </React.Fragment>
                                    ))}
                                </tbody>
                            </table>
                            <label>Validación de filtros excluyentes (Experiencia y Capacidad K):</label>
                            <select value={datos.miembros[0].cumpleFiltros} onChange={e => {
                                let n = [...datos.miembros];
                                n[0].cumpleFiltros = e.target.value;
                                setDatos({...datos, miembros: n});
                            }}>
                                <option value="si">Cumple con toda la experiencia y Capacidad K</option>
                                <option value="no">Falla en experiencia o Capacidad K insuficiente</option>
                            </select>

                            <h3>Motor de Decisión e IA</h3>
                            <div className="ia-box" style={{ borderColor: evaluacion.estado === 'NO GO' ? '#ff9999' : '#91d5ff' }}>
                                <div className="ia-title">🤖 Diagnóstico Automatizado (Análisis IA)</div>
                                <p>{evaluacion.mensajeIA}</p>
                            </div>

                            <div style={{ marginTop: '15px', padding: '15px', textAlign: 'center', fontWeight: 'bold', backgroundColor: evaluacion.color, color: evaluacion.textColor, borderRadius: '6px' }}>
                                ESTADO: {evaluacion.estado}
                            </div>
                        </div>
                    )}

                    {tab === 'IA' && (
                        <div className="card">
                            <h3>Analizador de Amarres</h3>
                            <label><input type="checkbox" checked={datos.esImagen} onChange={e => setDatos({...datos, esImagen: e.target.checked})} /> ¿PDF Imagen?</label>
                            <textarea style={{height:'150px'}} placeholder="Pega el análisis de la IA aquí..." value={datos.analisisIA} onChange={e => setDatos({...datos, analisisIA: e.target.value})} />
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
