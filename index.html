<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIEL PRO - Fase 1: Plan Básico</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #F1F5F9; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        header { background: #0C447C; color: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        nav { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .btn { padding: 10px 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input, select, textarea { width: 100%; padding: 10px; margin: 10px 0; border-radius: 6px; border: 1px solid #cbd5e1; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
        table { width: 100%; border-collapse: collapse; margin: 15px 0; }
        th, td { border: 1px solid #cbd5e1; padding: 8px; text-align: left; }
        th { background-color: #f8fafc; }
        .ia-box { background-color: #e6f7ff; border: 1px solid #91d5ff; border-radius: 6px; padding: 15px; margin-top: 15px; }
        .ia-title { color: #0050b3; font-weight: bold; margin-bottom: 10px; }
        .disclaimer-text { font-size: 11px; color: #475569; margin-top: 15px; text-align: justify; line-height: 1.4; border-top: 1px solid #e2e8f0; padding-top: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        {tab === 'PERFIL' && (
                        <div className="card">
                            <h3>Perfil & Fuentes de Búsqueda</h3>
                            
                            <div style={{marginBottom: '20px'}}>
                                <h4>🔗 Fuentes de Búsqueda</h4>
                                <ul>
                                    <li>SECOP I: <a href="https://www.contratos.gov.co/consultas/resultadoListadoProcesos.jsp?estado=2&desdeFomulario=true" target="_blank" rel="noreferrer">Ir a SECOP I</a></li>
                                    <li>SECOP II: <a href="https://community.secop.gov.co/Public/Tendering/ContractNoticeManagement/Index?currentLanguage=es-CO&Page=login&Country=CO&SkinName=CCE" target="_blank" rel="noreferrer">Ir a SECOP II</a></li>
                                    <li><a href="https://bogota.gov.co/asi-vamos/contratos-y-obras/participa" target="_blank" rel="noreferrer">Alcaldía Mayor de Bogotá - Contratos</a></li>
                                    <li><a href="https://leydepropiedadhorizontal.org/category/convocatorias/" target="_blank" rel="noreferrer">Convocatorias Propiedad Horizontal</a></li>
                                </ul>
                            </div>
                            
        function App() {
            const [tab, setTab] = useState('PERFIL');
            const [datos, setDatos] = useState({
                miembros: [{ id: 1, nombre: 'Empresa Líder', patrimonio: 0, expMax: 0, unspsc: "", liquidezRequisito: 1.5, coberturaRequisito: 1.2, capitalRequisito: 50000000, cumpleLiquidezOk: 'si', CoberturaOk: 'si', cumpleCapital: 'si', cumpleFiltros: 'si' }],
                entidad: '',
                objeto: '',
                presupuesto: 0,
                capacidadK: 100000000,
                promptIA: "",
                respuestaIA: "",
                tipoProceso: "Licitación Pública",
                fuenteProceso: "SECOP II",
                analisisExtraido: {
                    experiencia: "",
                    riesgos: "",
                    visitaTecnicaObligatoria: "No especificado",
                    manifestacionInteres: "No especificado",
                    checklistRequisitos: [
                        { item: "1. Experiencia mínima general", cumple: false, obs: "Validar certificaciones requeridas" },
                        { item: "2. Capacidad financiera (Liquidez y Nivel de Endeudamiento)", cumple: false, obs: "Verificar según pliegos" },
                        { item: "3. Visita técnica (obligatoria para participar)", cumple: false, obs: "Requisito de carácter excluyente" },
                        { item: "4. Capital de trabajo", cumple: false, obs: "Determinar flujo de caja" }
                    ]
                }
            });

            const generarPrompt = () => {
                const promptGenerado = `Actúa como un analista experto en contratación pública y pliegos de condiciones. Analiza el siguiente texto o pliego adjunto y extrae de manera concisa la siguiente información estructurada:
1. Experiencia mínima requerida y filtros excluyentes.
2. Viabilidad financiera y legal básica.
3. Riesgos identificados y posibles trampas o inconsistencias en los términos de referencia.
4. Indica si la visita técnica es obligatoria o no, y si se debe presentar manifestación de interés.
5. Lista de los documentos y requisitos habilitantes solicitados para la presentación de la oferta.

Texto del pliego / Términos de Referencia:
[PEGA AQUÍ EL TEXTO DEL PLIEGO O RESUMEN]`;
                setDatos({...datos, promptIA: promptGenerado});
            };

            const procesarRespuestaIA = () => {
                let experiencia = "Revisar texto de la IA";
                let riesgos = "Revisar texto de la IA";
                let visita = "No especificado";
                let interes = "No especificado";

                if (datos.respuestaIA) {
                    if (datos.respuestaIA.toLowerCase().includes("visita")) {
                        visita = datos.respuestaIA.toLowerCase().includes("obligatoria") ? "Sí, es obligatoria" : "No es obligatoria";
                    }
                    if (datos.respuestaIA.toLowerCase().includes("interés") || datos.respuestaIA.toLowerCase().includes("manifestación")) {
                        interes = "Requerido";
                    }
                }

                setDatos({
                    ...datos,
                    analisisExtraido: {
                        ...datos.analisisExtraido,
                        experiencia,
                        riesgos,
                        visitaTecnicaObligatoria: visita,
                        manifestacionInteres: interes,
                        checklistRequisitos: [
                            { item: "1. Experiencia mínima habilitante", cumple: true, obs: "Validado por IA" },
                            { item: "2. Personal técnico (Director de obra certificado)", cumple: false, obs: "Pendiente confirmar HV" },
                            { item: "3. Visita técnica obligatoria", cumple: false, obs: "Requisito excluyente" },
                            { item: "4. Capacidad financiera y liquidez", cumple: false, obs: "Revisar estados financieros" },
                            { item: "5. Pólizas y garantías exigidas", cumple: true, obs: "Exigencia estándar" },
                            { item: "6. Cumplimiento de plazos de ejecución", cumple: true, obs: "Aceptable" },
                            { item: "7. Estructura de costos y reajustes", cumple: false, obs: "Riesgo: Costo global sin reajuste" },
                            { item: "8. Retenciones contractuales (10%)", cumple: false, obs: "Impacto en capital de trabajo" },
                            { item: "9. Certificados de trabajo en alturas", cumple: true, obs: "Al día" },
                            { item: "10. Propiedad intelectual", cumple: true, obs: "Sin riesgo relevante" },
                            { item: "11. Penalidades por incumplimiento", cumple: false, obs: "Revisar multas" },
                            { item: "12. Anticipo del 30% del contrato", cumple: true, obs: "Fortaleza favorable" },
                            { item: "13. Disponibilidad de personal", cumple: true, obs: "Personal disponible" }
                        ]
                    }
                });
            };

            const copiarPrompt = () => {
                if (datos.promptIA) {
                    navigator.clipboard.writeText(datos.promptIA);
                    alert("¡Prompt copiado al portapapeles!");
                }
            };

            const toggleChecklist = (index) => {
                const nuevosItems = [...datos.analisisExtraido.checklistRequisitos];
                nuevosItems[index].cumple = !nuevosItems[index].cumple;
                setDatos({
                    ...datos,
                    analisisExtraido: {
                        ...datos.analisisExtraido,
                        checklistRequisitos: nuevosItems
                    }
                });
            };

            const imprimirOGuardarPDF = () => {
                const ventanaReporte = window.open('', '_blank');
                
                let checklistHTML = `<ul>`;
                if (datos.analisisExtraido.checklistRequisitos) {
                    datos.analisisExtraido.checklistRequisitos.forEach((chk) => {
                        checklistHTML += `<li><strong>${chk.item}</strong> - ¿Cumple?: ${chk.cumple ? 'SI' : 'NO'} | <em>Observación:</em> ${chk.obs}</li>`;
                    });
                }
                checklistHTML += `</ul>`;

                const htmlContent = `<!DOCTYPE html>
                <html lang="es">
                <head>
                    <meta charset="UTF-8">
                    <title>Informe de Viabilidad - SIEL PRO</title>
                    <style>
                        body { 
                            font-family: 'Helvetica Neue', Arial, sans-serif; 
                            color: #333; 
                            line-height: 1.6; 
                            padding: 30px; 
                            max-width: 800px; 
                            margin: 0 auto; 
                        }
                        h1 { color: #0C447C; border-bottom: 2px solid #0C447C; padding-bottom: 5px; font-size: 18pt; }
                        h2 { color: #1D9E75; margin-top: 25px; font-size: 13pt; }
                        p { font-size: 10pt; }
                        ul { font-size: 9pt; }
                        .box { 
                            background: #F8FAFC; 
                            border: 1px solid #CBD5E1; 
                            padding: 20px; 
                            border-radius: 6px; 
                            margin-top: 15px; 
                        }
                        .disclaimer { 
                            margin-top: 50px; 
                            font-size: 8pt; 
                            color: #64748B; 
                            border-top: 1px solid #E2E8F0; 
                            padding-top: 15px; 
                            text-align: justify; 
                        }
                        .btn-print {
                            background-color: #0C447C; 
                            color: white; 
                            padding: 10px 20px; 
                            border: none; 
                            border-radius: 5px; 
                            cursor: pointer; 
                            font-weight: bold;
                            margin-bottom: 20px;
                        }
                        @media print {
                            .btn-print { display: none; }
                        }
                    </style>
                </head>
                <body>
                    <button class="btn-print" onclick="window.print()">🖨️ Imprimir / Guardar como PDF</button>

                    <h1>SIEL PRO - Informe de Viabilidad de Proceso</h1>
                    
                    <h2>1. Información del Proceso</h2>
                    <p><strong>Entidad:</strong> ${datos.entidad || 'No especificada'}</p>
                    <p><strong>Objeto:</strong> ${datos.objeto || 'No especificado'}</p>
                    <p><strong>Presupuesto Oficial:</strong> $${datos.presupuesto || 0}</p>
                    <p><strong>Tipo de proceso:</strong> ${datos.tipoProceso}</p>

                    <h2>2. Análisis Estratégico SIEL (IA) - 13 Puntos de Control</h2>
                    <div class="box">
                        ${checklistHTML}
                    </div>

                    <h2>3. Resumen del Análisis</h2>
                    <div class="box">
                        <p><strong>Visita Técnica Obligatoria:</strong> ${datos.analisisExtraido?.visitaTecnicaObligatoria || 'No especificado'}</p>
                        <p><strong>Manifestación de Interés:</strong> ${datos.analisisExtraido?.manifestacionInteres || 'No especificado'}</p>
                    </div>

                    <div class="disclaimer">
                        <strong>AVISO LEGAL:</strong> Este informe es de carácter estrictamente informativo y fue generado como una herramienta de apoyo mediante Inteligencia Artificial. La decisión final para la presentación de la oferta, así como la verificación de los requisitos habilitantes, es responsabilidad única y exclusiva del proponente.
                    </div>
                </body>
                </html>`;

                ventanaReporte.document.open();
                ventanaReporte.document.write(htmlContent);
                ventanaReporte.document.close();
            };

            return (
                <div className="container">
                    <header>
                        <h2 style={{margin:0}}>SIEL PRO - Fase 1: Plan Básico</h2>
                        <span>UVT 2026: $52.374</span>
                    </header>

                    <nav>
                        <button className="btn" style={{background: tab==='PERFIL'?'#1D9E75':'#94a3b8'}} onClick={() => setTab('PERFIL')}>PERFIL</button>
                        <button className="btn" style={{background: tab==='IA'?'#1D9E75':'#94a3b8'}} onClick={() => setTab('IA')}>TRAMPAS IA</button>
                    </nav>

                    {tab === 'PERFIL' && (
                        <div className="card">
                            <h3>Perfil del Proceso</h3>
                            <div className="grid">
                                <div>
                                    <label>Tipo de Proceso:</label>
                                    <select value={datos.tipoProceso} onChange={e => setDatos({...datos, tipoProceso: e.target.value})}>
                                        <option>Licitación Pública</option>
                                        <option>Selección Abreviada</option>
                                        <option>Términos de Referencia Privados</option>
                                    </select>
                                </div>
                                <div>
                                    <label>Plataforma:</label>
                                    <select value={datos.fuenteProceso} onChange={e => setDatos({...datos, fuenteProceso: e.target.value})}>
                                        <option>SECOP II</option>
                                        <option>Propiedad Horizontal</option>
                                    </select>
                                </div>
                            </div>
                            
                            <h4>Datos de la Licitación</h4>
                            <div className="grid">
                                <div>
                                    <label>Nombre de la Entidad:</label>
                                    <input value={datos.entidad} onChange={e => setDatos({...datos, entidad: e.target.value})} />
                                </div>
                                <div>
                                    <label>Objeto del Proceso:</label>
                                    <input value={datos.objeto} onChange={e => setDatos({...datos, objeto: e.target.value})} />
                                </div>
                            </div>
                            <div className="grid">
                                <div>
                                    <label>Presupuesto Oficial ($):</label>
                                    <input type="number" value={datos.presupuesto || ''} onChange={e => setDatos({...datos, presupuesto: e.target.value})} />
                                </div>
                            </div>
                        </div>
                    )}

                    {tab === 'IA' && (
                        <div className="card">
                            <h3>Generador y Analizador de Pliegos</h3>
                            
                            <button className="btn" style={{backgroundColor: '#059669', marginBottom: '10px'}} onClick={generarPrompt}>
                                📋 Generar Prompt para IA
                            </button>

                            {datos.promptIA && (
                                <div>
                                    <textarea readOnly style={{height: '100px', backgroundColor: '#f8fafc'}} value={datos.promptIA} />
                                    <button className="btn" style={{backgroundColor: '#0C447C', marginBottom: '15px'}} onClick={copiarPrompt}>
                                        Copiar Prompt
                                    </button>
                                </div>
                            )}

                            <h4>Pegar resultado del análisis de la IA:</h4>
                            <textarea 
                                style={{height: '120px'}} 
                                placeholder="Pega aquí el texto con el análisis de la licitación..." 
                                value={datos.respuestaIA} 
                                onChange={e => setDatos({...datos, respuestaIA: e.target.value})} 
                            />
                            
                            <button className="btn" style={{backgroundColor: '#1D9E75', marginBottom: '20px'}} onClick={procesarRespuestaIA}>
                                ✨ Procesar 13 Puntos de Control
                            </button>

                            <h3>Checklist Estratégico (13 Puntos SIEL)</h3>
                            <div className="ia-box">
                                <p style={{fontSize: '11px', color: '#64748B'}}><em>Selecciona los puntos que cumpla el proponente para evaluar la viabilidad de la oferta.</em></p>
                                
                                {datos.analisisExtraido?.checklistRequisitos?.map((item, index) => (
                                    <div key={index} style={{display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '8px 0', borderBottom: '1px solid #e2e8f0'}}>
                                        <span style={{fontSize: '12px'}}>{item.item}</span>
                                        <div style={{display: 'flex', alignItems: 'center', gap: '10px'}}>
                                            <span style={{fontSize: '10px', color: '#64748B'}}>{item.obs}</span>
                                            <input 
                                                type="checkbox" 
                                                checked={item.cumple} 
                                                onChange={() => toggleChecklist(index)} 
                                                style={{width: '20px', margin: '0'}} 
                                            />
                                        </div>
                                    </div>
                                ))}

                                <button className="btn" style={{backgroundColor: '#0C447C', marginTop: '20px', width: '100%'}} onClick={imprimirOGuardarPDF}>
                                    🖨️ Imprimir / Guardar Check-list en PDF
                                </button>
                                
                                <p className="disclaimer-text">
                                    <strong>AVISO LEGAL:</strong> Este informe es de carácter estrictamente informativo y fue generado como una herramienta de apoyo mediante Inteligencia Artificial. La decisión final para la presentación de la oferta, así como la verificación de los requisitos habilitantes, es responsabilidad única y exclusiva del proponente.
                                </p>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
