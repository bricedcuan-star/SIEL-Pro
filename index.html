<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIEL PRO MASTER 5.0</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root { --blue: #0C447C; --green: #1D9E75; --red: #e11d48; }
        body { background-color: #F8FAFC; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        header { background: var(--blue); color: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        nav { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .btn-nav { padding: 10px 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: #e2e8f0; color: #64748b; }
        .active { background: var(--blue) !important; color: white !important; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid #e2e8f0; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        input, select, textarea { width: 100%; padding: 10px; margin: 5px 0; border-radius: 8px; border: 1px solid #cbd5e1; box-sizing: border-box; }
        .prompt-box { background: #1e293b; color: #38bdf8; padding: 15px; border-radius: 10px; font-family: monospace; font-size: 12px; margin: 10px 0; white-space: pre-wrap; }
        .badge { padding: 5px 10px; border-radius: 15px; font-size: 11px; font-weight: bold; }
        .pass { background: #dcfce7; color: #166534; }
        .fail { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [tab, setTab] = useState('ESTRUCTURA');
            const [datos, setDatos] = useState({
                tipoEmpresa: "Contratista",
                asociacion: "Empresa Única",
                miembros: [{ id: 1, nombre: '', participacion: 100, unspsc: '' }],
                activos: 0, pasivos: 0, utilidad: 0, gastosInt: 0,
                valorContrato: 0, usaAIU: false, pA: 5, pI: 2, pU: 3,
                tasaIca: 9.66, estampillas: 2
            });

            // Cálculos
            const liq = datos.pasivos > 0 ? (Number(datos.activos) / Number(datos.pasivos)).toFixed(2) : 0;
            const end = datos.activos > 0 ? ((Number(datos.pasivos) / Number(datos.activos)) * 100).toFixed(1) : 0;
            
            const vTotal = Number(datos.valorContrato) || 0;
            const baseRF = datos.usaAIU ? (vTotal * (Number(datos.pU) / 100)) : vTotal;
            const rf = baseRF * 0.04;
            const ica = (vTotal * Number(datos.tasaIca)) / 1000;
            const est = vTotal * (Number(datos.estampillas) / 100);
            const neto = vTotal - (rf + ica + est);

            const PROMPT = `Actúa como Experto en Contratación Colombia. Analiza este pliego para ${datos.tipoEmpresa}. 
            1. Busca amarres en UNSPSC: ${datos.miembros[0].unspsc}. 
            2. Evalúa Indicadores: Liquidez ${liq} y Endeudamiento ${end}%. 
            3. Detecta riesgos en cláusulas de multas y plazos.`;

            return (
                <div className="container">
                    <header>
                        <div><h1 style={{margin:0}}>SIEL PRO MASTER 5.0</h1><small>Blindaje Contractual & Consultoría</small></div>
                        <span className="badge" style={{background:'#facc15'}}>UVT 2026: $52.374</span>
                    </header>

                    <nav>
                        {['ESTRUCTURA', 'FINANZAS', 'IA', 'RETENCOL', 'INFORMES'].map(t => (
                            <button key={t} className={`btn-nav ${tab === t ? 'active' : ''}`} onClick={() => setTab(t)}>{t}</button>
                        ))}
                    </nav>

                    {tab === 'ESTRUCTURA' && (
                        <div className="card">
                            <h3>Estructura del Proponente</h3>
                            <div className="grid">
                                <div>
                                    <label>Tipo de Consultoría</label>
                                    <select onChange={e=>setDatos({...datos, tipoEmpresa: e.target.value})}>
                                        <option>Contratista</option>
                                        <option>Interventoría</option>
                                        <option>Consultoría</option>
                                    </select>
                                </div>
                                <div>
                                    <label>Forma Asociativa</label>
                                    <select onChange={e=>setDatos({...datos, asociacion: e.target.value})}>
                                        <option>Empresa Única</option>
                                        <option>Unión Temporal</option>
                                        <option>Consorcio</option>
                                    </select>
                                </div>
                            </div>
                            <hr/>
                            {datos.miembros.map((m, i) => (
                                <div key={m.id} style={{marginBottom:'15px'}}>
                                    <div className="grid">
                                        <input placeholder="Nombre Miembro" />
                                        <input type="number" placeholder="% Part." />
                                        <input placeholder="Códigos UNSPSC" onChange={e => {
                                            let n = [...datos.miembros]; n[i].unspsc = e.target.value; setDatos({...datos, miembros: n});
                                        }}/>
                                    </div>
                                </div>
                            ))}
                            <button className="btn-nav" onClick={()=>setDatos({...datos, miembros: [...datos.miembros, {id:Date.now()}]})}>+ Añadir Miembro</button>
                        </div>
                    )}

                    {tab === 'FINANZAS' && (
                        <div className="grid">
                            <div className="card">
                                <h3>Habilitantes RUP</h3>
                                <label>Activo Corriente</label><input type="number" onChange={e=>setDatos({...datos, activos: e.target.value})} />
                                <label>Pasivo Corriente</label><input type="number" onChange={e=>setDatos({...datos, pasivos: e.target.value})} />
                            </div>
                            <div className="card">
                                <h3>Veredicto</h3>
                                <p>Liquidez (>1.2): <span className={`badge ${liq>=1.2?'pass':'fail'}`}>{liq}</span></p>
                                <p>Endeudamiento (<70%): <span className={`badge ${end<=70?'pass':'fail'}`}>{end}%</span></p>
                            </div>
                        </div>
                    )}

                    {tab === 'IA' && (
                        <div className="card">
                            <h3>Cerebro IA - Prompt Maestro</h3>
                            <div className="prompt-box">{PROMPT}</div>
                            <hr/>
                            <h4>Trampas Comunes en Pliegos</h4>
                            <label><input type="checkbox" /> Visita de obra obligatoria en tiempos cortos</label>
                            <label><input type="checkbox" /> Personal con certificaciones muy específicas (Amarre)</label>
                            <label><input type="checkbox" /> Indicadores financieros por encima del promedio sectorial</label>
                        </div>
                    )}

                    {tab === 'RETENCOL' && (
                        <div className="grid">
                            <div className="card">
                                <h3>Calculadora Fiscal</h3>
                                <label>Valor Contrato</label><input type="number" onChange={e=>setDatos({...datos, valorContrato: e.target.value})} />
                                <label><input type="checkbox" onChange={e=>setDatos({...datos, usaAIU: e.target.checked})} /> ¿Aplica AIU (Aseo/Vigilancia/Obra)?</label>
                                {datos.usaAIU && <input type="number" placeholder="% Utilidad (U)" onChange={e=>setDatos({...datos, pU: e.target.value})} />}
                                <label>ICA (x mil)</label><input type="number" value={datos.tasaIca} onChange={e=>setDatos({...datos, tasaIca: e.target.value})} />
                                <label>Estampillas (%)</label><input type="number" value={datos.estampillas} onChange={e=>setDatos({...datos, estampillas: e.target.value})} />
                            </div>
                            <div className="card" style={{background: '#0C447C', color: 'white'}}>
                                <h3>Neto: ${neto.toLocaleString()}</h3>
                                <small>Retención Fuente: -${rf.toLocaleString()}</small><br/>
                                <small>ReteICA: -${ica.toLocaleString()}</small><br/>
                                <small>Estampillas: -${est.toLocaleString()}</small>
                            </div>
                        </div>
                    )}

                    {tab === 'INFORMES' && (
                        <div className="card" style={{textAlign:'center'}}>
                            <h2>Dashboard de Resultados</h2>
                            <div className="grid">
                                <button className="btn-nav" style={{background:var(--green), color:'white', padding:'20px'}}>DESCARGAR EXCEL TIPO SIEL</button>
                                <button className="btn-nav" style={{background:var(--red), color:'white', padding:'20px'}}>GENERAR VEREDICTO PDF GO/NO GO</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
