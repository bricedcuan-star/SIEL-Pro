<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SIEL PRO V7.5 | REPORTE ADMINISTRATIVO Y LEGAL</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --azul-profundo: #061624; --azul-briced: #0C2D48; --oro: #D4AF37; --fondo: #f8fafc; --blanco: #ffffff; --rojo: #e11d48; }
        body { font-family: 'Lexend', sans-serif; margin: 0; background-color: var(--fondo); color: #1e293b; }
        header { background: linear-gradient(135deg, var(--azul-profundo) 0%, var(--azul-briced) 100%); color: var(--blanco); padding: 20px 50px; border-bottom: 5px solid var(--oro); display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 24px; font-weight: 900; letter-spacing: 2px; }
        .logo span { color: var(--oro); }
        .container { max-width: 1100px; margin: -30px auto 50px auto; padding: 0 20px; }
        .glass-card { background: var(--blanco); border-radius: 20px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 25px; border-left: 6px solid var(--azul-briced); }
        .form-grid { display: grid; grid-template-columns: 1fr 1.2fr; gap: 30px; margin-top: 15px; }
        label { display: block; font-size: 11px; font-weight: 800; color: #64748b; margin-bottom: 5px; text-transform: uppercase; }
        input, textarea, select { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; font-family: inherit; font-weight: 600; box-sizing: border-box; background: #fcfcfc; }
        .prompt-box { background: var(--azul-profundo); color: #a5b4fc; padding: 15px; border-radius: 12px; border: 1px dashed var(--oro); margin-top: 10px; }
        .btn-copy { background: var(--oro); color: var(--azul-profundo); border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: 900; font-size: 11px; margin-top: 5px; }
        .decision-hero { border-radius: 20px; padding: 35px; text-align: center; color: var(--blanco); transition: 0.5s; }
        .status-go { background: linear-gradient(135deg, #059669 0%, #10b981 100%); }
        .status-cond { background: linear-gradient(135deg, #d97706 0%, #f59e0b 100%); }
        .status-nogo { background: linear-gradient(135deg, #be123c 0%, #e11d48 100%); }
        .btn-premium { background: var(--oro); color: var(--azul-profundo); padding: 18px 40px; border-radius: 50px; border: none; font-weight: 900; cursor: pointer; text-transform: uppercase; margin-top: 20px; box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3); }
    </style>
</head>
<body>

<header>
    <div class="logo">SIEL PRO <span>V7.5</span></div>
    <div style="text-align: right;">
        <div style="font-weight: 900; font-size: 14px;">BRICED CONSULTING</div>
        <div style="font-size: 10px; color: var(--oro);">SISTEMA DE AUDITORÍA ESTRATÉGICA</div>
    </div>
</header>

<div style="height: 60px; background: linear-gradient(180deg, var(--azul-briced) 0%, transparent 100%);"></div>

<div class="container">
    <div class="glass-card">
        <h3><i class="fas fa-briefcase" style="color: var(--oro);"></i> Gestión del Proceso</h3>
        <div class="form-grid">
            <div>
                <label>Objeto del Contrato</label>
                <input type="text" id="proc_nombre" placeholder="Ej: Servicios Integrales de Aseo">
                <label style="margin-top:15px">Entidad Solicitante</label>
                <input type="text" id="proc_entidad" placeholder="Ej: Conjunto Residencial">
                <div class="prompt-box">
                    <p id="promptText" style="margin:0; font-size: 10px; line-height: 1.3;">"Genera el análisis separando HALLAZGOS de RECOMENDACIONES. Usa subtítulos claros y evita símbolos extraños."</p>
                    <button class="btn-copy" onclick="copyPrompt()">COPIAR PROMPT ESTRUCTURADO</button>
                </div>
            </div>
            <div>
                <label>Resultados de la IA (Hallazgos y Sugerencias)</label>
                <textarea id="proc_resumen" rows="12" placeholder="Pega aquí el contenido..."></textarea>
            </div>
        </div>
    </div>

    <div class="glass-card">
        <h3><i class="fas fa-gavel" style="color: var(--oro);"></i> Concepto de Viabilidad</h3>
        <div style="display: flex; gap: 20px;">
            <div style="flex:1">
                <label>Requisitos Técnicos</label>
                <select onchange="updateUI()" class="status-sel"><option value="ok">✔ CUMPLE</option><option value="no">❌ NO CUMPLE</option></select>
            </div>
            <div style="flex:1">
                <label>Requisitos Jurídicos</label>
                <select onchange="updateUI()" class="status-sel"><option value="ok">✔ CUMPLE</option><option value="no">❌ NO CUMPLE</option></select>
            </div>
        </div>
    </div>

    <div id="decision_hero" class="decision-hero status-go">
        <h1 id="decision_txt" style="font-size: 36px; font-weight: 900; margin: 0;">🟢 GO - PRESENTARSE</h1>
        <button class="btn-premium" onclick="genReport()"><i class="fas fa-file-invoice"></i> GENERAR REPORTE ADMINISTRATIVO</button>
    </div>
</div>

<script>
    function copyPrompt() {
        const text = document.getElementById('promptText').innerText;
        navigator.clipboard.writeText(text);
        alert("Prompt Estructurado Copiado.");
    }

    function updateUI() {
        const sels = document.querySelectorAll('.status-sel');
        let fails = 0; sels.forEach(s => { if(s.value === 'no') fails++; });
        const hero = document.getElementById('decision_hero');
        const txt = document.getElementById('decision_txt');
        if(fails === 0) { hero.className = "decision-hero status-go"; txt.innerText = "🟢 GO - PRESENTARSE"; }
        else { hero.className = "decision-hero status-nogo"; txt.innerText = "🔴 NO GO - NO VIABLE"; }
    }

    // LIMPIEZA DE CARACTERES PARA EVITAR SÍMBOLOS RAROS
    function cleanText(str) {
        if (!str) return "";
        return str
            .replace(/[^\x00-\x7F]/g, " ") // Reemplaza no-ASCII por espacio
            .replace(/\*/g, "")            // Quita asteriscos de negritas de ChatGPT
            .replace(/#/g, "");            // Quita numerales
    }

    function genReport() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const nombre = cleanText(document.getElementById('proc_nombre').value || "PROCESO");
        const entidad = cleanText(document.getElementById('proc_entidad').value || "ENTIDAD");
        const resumen = cleanText(document.getElementById('proc_resumen').value || "");
        const decision = document.getElementById('decision_txt').innerText;

        // PÁGINA 1 - CABECERA PROFESIONAL
        doc.setFillColor(6, 22, 36); doc.rect(0, 0, 210, 45, 'F');
        doc.setTextColor(212, 175, 55); doc.setFontSize(20); doc.setFont("helvetica", "bold");
        doc.text("REPORTE DE AUDITORÍA ESTRATÉGICA", 105, 22, { align: 'center' });
        doc.setTextColor(255); doc.setFontSize(10); doc.setFont("helvetica", "normal");
        doc.text("SIEL PRO - BRICED CONSULTING", 105, 32, { align: 'center' });

        // RESUMEN EJECUTIVO
        doc.setTextColor(6, 22, 36); doc.setFontSize(13); doc.setFont("helvetica", "bold");
        doc.text("1. RESUMEN DE IDENTIFICACIÓN", 20, 60);
        doc.setDrawColor(212, 175, 55); doc.setLineWidth(0.5); doc.line(20, 62, 190, 62);

        doc.setFontSize(10); doc.text("OBJETO:", 20, 72);
        doc.setFont("helvetica", "normal"); doc.text(nombre, 50, 72);
        doc.setFont("helvetica", "bold"); doc.text("ENTIDAD:", 20, 80);
        doc.setFont("helvetica", "normal"); doc.text(entidad, 50, 80);
        doc.setFont("helvetica", "bold"); doc.text("CONCEPTO:", 20, 88);
        doc.text(decision, 50, 88);

        // CONTENIDO DINÁMICO
        doc.setFontSize(13); doc.setFont("helvetica", "bold");
        doc.text("2. HALLAZGOS Y RECOMENDACIONES", 20, 105);
        doc.line(20, 107, 190, 107);

        doc.setFontSize(9); doc.setFont("helvetica", "normal");
        const lines = doc.splitTextToSize(resumen, 170);
        let cursorY = 115;

        lines.forEach(line => {
            if (cursorY > 260) {
                doc.addPage(); cursorY = 25;
            }
            
            // Detectar si es un subtítulo o palabra clave para poner en Negrita
            const upperLine = line.toUpperCase();
            if (upperLine.includes("HALLAZGO") || upperLine.includes("RECOMENDACIÓN") || upperLine.includes("ALERTA") || upperLine.includes("PUNTO")) {
                doc.setFont("helvetica", "bold");
                doc.setTextColor(12, 45, 72);
                doc.text(line, 20, cursorY);
                doc.setFont("helvetica", "normal");
                doc.setTextColor(0);
            } else {
                doc.text(line, 20, cursorY);
            }
            cursorY += 5.5;
        });

        // SALVEDAD JURÍDICA (Siempre al final)
        if (cursorY > 230) { doc.addPage(); cursorY = 30; }
        cursorY += 10;
        doc.setDrawColor(200); doc.setFillColor(245, 247, 249);
        doc.rect(20, cursorY, 170, 30, 'F');
        doc.setFont("helvetica", "bold"); doc.setFontSize(9); doc.setTextColor(100, 0, 0);
        doc.text("NOTA DE SALVEDAD JURÍDICA:", 25, cursorY + 8);
        doc.setFont("helvetica", "italic"); doc.setFontSize(8); doc.setTextColor(80);
        const salvedad = "Este informe es una herramienta de analisis estrategico basada en Inteligencia Artificial y no constituye un dictamen juridico vinculante. La decision final de participacion y la veracidad de la informacion presentada ante la entidad es responsabilidad exclusiva del proponente.";
        doc.text(doc.splitTextToSize(salvedad, 160), 25, cursorY + 15);

        // PIE DE PÁGINA
        const pages = doc.internal.getNumberOfPages();
        for(let i=1; i<=pages; i++) {
            doc.setPage(i);
            doc.setFontSize(8); doc.setTextColor(150);
            doc.text("Reporte de Auditoría SIEL PRO | Página " + i + " de " + pages, 105, 290, { align: 'center' });
        }

        doc.save("Reporte_Administrativo_SIEL.pdf");
    }
</script>
</body>
</html>
