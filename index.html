<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIEL PRO - Blindaje Total</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root { --blue: #0C447C; --green: #1D9E75; --red: #e11d48; --dark: #1e293b; }
        body { background-color: #F1F5F9; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; color: var(--dark); }
        .container { max-width: 1200px; margin: 0 auto; }
        header { background: var(--blue); color: white; padding: 25px; border-radius: 15px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        nav { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; transition: 0.3s; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; }
        label { font-weight: bold; font-size: 13px; display: block; margin-top: 10px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: 1px solid #cbd5e1; box-sizing: border-box; }
        .badge { padding: 6px 12px; border-radius: 20px; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .pass { background: #dcfce7; color: #166534; }
        .fail { background: #fee2e2; color: #991b1b; }
        .prompt-box { background: #f8fafc; border-left: 4px solid var(--blue); padding: 15px; font-family: monospace; font-size: 12px; margin: 10px 0; white-space: pre-wrap; }
        .aiu-box { background: #eff6ff; padding: 15px; border-radius: 10px; margin-top: 10px; border: 1px solid #bfdbfe; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [tab, setTab] = useState('PERFIL');
            const [datos, setDatos] = useState({
                empresa: "", tipo: "Contratista", unspsc: "",
                activos: 0, pasivos: 0, utilidad: 0, gInt: 0,
                contratos: [{ id: 1, smmlv: 0, objeto: "" }],
                valorBase: 0, tasaIca: 9.66, estampillas: 2, 
                usaAIU: false, pA: 5, pI: 2, pU: 3, // AIU por defecto
                analisisIA: "", esOCR: false
            });

            // Cálculos Financieros
            const liq = datos.pasivos > 0 ? (Number(datos.activos) / Number(datos.pasivos)).toFixed(2) : 0;
            const end = datos.activos > 0 ? ((Number(datos.pasivos) / Number(datos.activos)) * 100).toFixed(1) : 0;
            const cob = datos.gInt > 0 ? (Number(datos.utilidad) / Number(datos.gInt)).toFixed(2) : 0;

            // Lógica RETENCOL con AIU
            const valorTotal = Number(datos.valorBase) || 0;
            const porcentajeUtilidad = datos.usaAIU ? Number(datos.pU) / 100 : 1;
            const baseGravable = datos.usaAIU ? (valorTotal * porcentajeUtilidad) : valorTotal;

            const rf = baseGravable * 0.04; // Renta sobre base o utilidad
            const ica = (valorTotal * Number(datos.tasaIca)) / 1000; // ICA suele ser sobre ingreso bruto
            const est = valorTotal * (Number(datos.estampillas) / 100);
            
            const totalDeduc = rf + ica + est;
            const neto = valorTotal - totalDeduc;

            const PROMPT_MAESTRO = `Analiza pliego para ${datos.tipo}. Detecta amarres en UNSPSC: ${datos.unspsc}. Evalúa indicadores: Liq ${liq}, End ${end}%.`;

            return (
                <div className="container">
                    <header>
                        <div><h1>SIEL PRO MASTER 4.0</h1><p>Consultoría en Blindaje & Impuestos</p></div>
                        <div style={{textAlign:'right'}}><span className="badge" style={{background:'#1e293b'}}>UVT 2026: $52.374</span></div>
                    </header>

                    <nav>
                        <button className="btn" style={{background: tab==='PERFIL'?'#1D9E75':'#94a3b8'}} onClick={()=>setTab('PERFIL')}>📊 PERFIL & RUP</button>
                        <button className="btn" style={{background: tab==='IA'?'#1D9E75':'#94a3b8'}} onClick={()=>setTab('IA')}>🔍 ANÁLISIS IA</button>
                        <button className="btn" style={{background: tab==='RETEN'?'#1D9E75':'#94a3b8'}} onClick={()=>setTab('RETEN')}>💰 RETENCOL AIU</button>
                    </nav>

                    {tab === 'PERFIL' && (
                        <div className="grid">
                            <div className="card">
                                <h3>Datos de Identificación</h3>
                                <label>Nombre Empresa</label>
                                <input placeholder="Razón Social" onChange={e=>setDatos({...datos, empresa: e.target.value})} />
                                <label>Tipo de Intervención</label>
                                <select onChange={e=>setDatos({...datos, tipo: e.target.value})}>
                                    <option>Contratista</option>
                                    <option>Interventoría</option>
                                    <option>Consultoría</option>
                                </select>
                                <label>Códigos UNSPSC (Habilitados)</label>
                                <textarea placeholder="Ej: 81101500, 72102900..." onChange={e=>setDatos({...datos, unspsc: e.target.value})} />
                            </div>
                            <div className="card">
                                <h3>Financiero & Experiencia</h3>
                                <div className="grid" style={{gridTemplateColumns:'1fr 1fr'}}>
                                    <div><label>Activo C.</label><input type="number" onChange={e=>setDatos({...datos, activos: e.target.value})} /></div>
                                    <div><label>Pasivo C.</label><input type="number" onChange={e=>setDatos({...datos, pasivos: e.target.value})} /></div>
                                </div>
                                <p>Liquidez: <span className={`badge ${liq>=1.2?'pass':'fail'}`}>{liq}</span></p>
                                <hr/>
                                <h4>Experiencia RUP</h4>
                                {datos.contratos.map(c => <div key={c.id}><input placeholder="Contrato en SMMLV" type="number" /></div>)}
                                <button className="btn" style={{background: 'var(--blue)', width:'100%'}} onClick={()=>setDatos({...datos, contratos:[...datos.contratos, {id:Date.now()}]})}>+ Añadir Contrato</button>
                            </div>
                        </div>
                    )}

                    {tab === 'IA' && (
                        <div className="card">
                            <h3>Módulo de Inteligencia</h3>
                            <div className="prompt-box"><strong>PROMPT PERSONALIZADO:</strong><br/>{PROMPT_MAESTRO}</div>
                            <label style={{color: 'red'}}><input type="checkbox" onChange={e=>setDatos({...datos, esOCR: e.target.checked})} /> DOCUMENTO ESCANEADO (OCR)</label>
                            <textarea style={{height:'150px'}} placeholder="Resultados de la IA..." onChange={e=>setDatos({...datos, analisisIA: e.target.value})} />
                            <button className="btn" style={{background: 'var(--red)', width:'100%'}}>📄 GENERAR INFORME VIABILIDAD PDF</button>
                        </div>
                    )}

                    {tab === 'RETENCOL' && (
                        <div className="grid">
                            <div className="card">
                                <h3>Cálculo de Impuestos</h3>
                                <label>Valor Contrato</label>
                                <input type="number" onChange={e=>setDatos({...datos, valorBase: e.target.value})} />
                                <label style={{color: 'var(--blue)'}}>
                                    <input type="checkbox" onChange={e=>setDatos({...datos, usaAIU: e.target.checked})} /> ¿APLICA AIU? (Aseo, Vigilancia, Obra)
                                </label>
                                {datos.usaAIU && (
                                    <div className="aiu-box">
                                        <div className="grid" style={{gridTemplateColumns:'1fr 1fr 1fr'}}>
                                            <div><label>%A</label><input type="number" value={datos.pA} onChange={e=>setDatos({...datos, pA: e.target.value})} /></div>
                                            <div><label>%I</label><input type="number" value={datos.pI} onChange={e=>setDatos({...datos, pI: e.target.value})} /></div>
                                            <div><label>%U</label><input type="number" value={datos.pU} onChange={e=>setDatos({...datos, pU: e.target.value})} /></div>
                                        </div>
                                    </div>
                                )}
                                <label>ICA (x mil)</label><input type="number" value={datos.tasaIca} onChange={e=>setDatos({...datos, tasaIca: e.target.value})} />
                                <label>% Estampillas</label><input type="number" value={datos.estampillas} onChange={e=>setDatos({...datos, estampillas: e.target.value})} />
                            </div>
                            <div className="card" style={{background: 'var(--blue)', color: 'white'}}>
                                <h3>Resultado Final</h3>
                                <p>ReteFuente: -${rf.toLocaleString()}</p>
                                <p>ReteICA: -${ica.toLocaleString()}</p>
                                <p>Estampillas: -${est.toLocaleString()}</p>
                                <hr/>
                                <h2 style={{color: 'var(--green)'}}>NETO: ${neto.toLocaleString()}</h2>
                                <button className="btn" style={{background: 'white', color: 'black', width:'100%'}}>📊 EXPORTAR EXCEL TIPO SIEL</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
