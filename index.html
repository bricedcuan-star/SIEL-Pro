<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIEL PRO 6.5 - CONSULTORÍA SENIOR</title>
    <style>
        :root { --blue: #0C447C; --green: #1D9E75; --red: #e11d48; --gold: #b45309; --dark: #1e293b; }
        body { background-color: #f1f5f9; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; color: var(--dark); }
        .container { max-width: 1200px; margin: 0 auto; }
        
        header { background: var(--blue); color: white; padding: 20px; border-radius: 15px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        
        /* AJUSTE DEL MENÚ PARA QUE NO SE CORTE */
        nav { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); 
            gap: 8px; 
            margin-bottom: 20px; 
            background: white; 
            padding: 10px; 
            border-radius: 12px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        
        .btn-nav { 
            padding: 10px; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            background: #e2e8f0; 
            color: #475569; 
            font-size: 12px;
            text-align: center;
        }
        
        .btn-nav.active { background: var(--blue); color: white; }
        .btn-dashboard { background: #facc15 !important; color: #854d0e !important; border: 1px solid #eab308; }

        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; display: none; }
        .card.active { display: block; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; }
        label { font-weight: 700; font-size: 12px; display: block; margin-top: 10px; color: var(--blue); }
        input, select, textarea { width: 100%; padding: 10px; margin: 5px 0; border-radius: 8px; border: 1px solid #cbd5e1; box-sizing: border-box; }
        
        .prompt-box { background: #1e293b; color: #38bdf8; padding: 15px; border-radius: 12px; font-family: monospace; font-size: 12px; height: 120px; overflow-y: auto; }
        
        /* BOTONES DE DESCARGA */
        .btn-download { 
            padding: 20px; 
            border-radius: 15px; 
            border: none; 
            color: white; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h2 style="margin:0; font-size: 18px;">SIEL PRO 6.5</h2>
        <span style="background:#facc15; color:#000; padding: 5px 10px; border-radius: 15px; font-size: 11px; font-weight: bold;">UVT 2026: $52.374</span>
    </header>

    <nav>
        <button class="btn-nav active" onclick="showTab('tab-config', this)">⚙️ CONFIG</button>
        <button class="btn-nav" onclick="showTab('tab-empresa', this)">🏢 EMPRESA</button>
        <button class="btn-nav" onclick="showTab('tab-ia', this)">🤖 IA PROMPT</button>
        <button class="btn-nav" onclick="showTab('tab-retencol', this)">💰 RETENCOL</button>
        <button class="btn-nav btn-dashboard" onclick="showTab('tab-dashboard', this)">📊 DASHBOARD</button>
    </nav>

    <div id="tab-config" class="card active"><h3>Configuración</h3><p>Usa el menú de arriba para navegar.</p></div>
    <div id="tab-empresa" class="card"><h3>Datos Empresa</h3><input type="number" placeholder="Capital Trabajo"></div>
    <div id="tab-ia" class="card"><h3>Cerebro IA</h3><div class="prompt-box">Prompt listo...</div></div>
    <div id="tab-retencol" class="card"><h3>Retencol Pro</h3><input type="number" placeholder="Valor Contrato"></div>

    <div id="tab-dashboard" class="card">
        <h2 style="text-align:center; color:var(--blue);">Panel de Informes Finales</h2>
        <div class="grid" style="margin-top:20px;">
            <button class="btn-download" style="background:var(--green);" onclick="alert('Generando PDF del Veredicto...')">
                <span>📄 DESCARGAR INFORME PDF</span>
                <small style="font-weight:normal; font-size:11px;">Veredicto GO / NO-GO</small>
            </button>
            <button class="btn-download" style="background:var(--blue);" onclick="alert('Generando Matriz Excel...')">
                <span>📊 DESCARGAR DASHBOARD EXCEL</span>
                <small style="font-weight:normal; font-size:11px;">Cálculos Fiscales Completos</small>
            </button>
        </div>
    </div>
</div>

<script>
    function showTab(id, btn) {
        document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }
</script>

</body>
</html>
